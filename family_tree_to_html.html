<html>
  <head>
    <meta charset="UTF-8" />
    <title>Family Tree</title>
    <style>
      :root {
        --cream: #f7f3ec;
        --parchment: #ede5d4;
        --ink: #1c1710;
        --brown: #6b4c2a;
        --rust: #a0522d;
        --gold: #c9a84c;
        --gold-lt: #e8d5a3;
        --line: #c4a87a;
        --muted: #7a6a54;
        --card-bg: #fffdf7;
        --light-green: #d4e8d0;
        --line-width: 1.5px;
        --vertical-connect-line-height: 20px;
        --loving-blue-color: #6a8fb0;
        --person-width: 64px;
        --heart-width: 18px;
        --person-margin: 5px;
        --spouse-lighten-pcnt: 40%;
      }

      #drop-zone {
        border: 1.5px dashed var(--color-border-secondary);
        /* border-radius:12px; */
        margin-block: 10px;
        padding: 3rem 2rem;
        text-align: center;
        cursor: pointer;
        background: var(--parchment);
      }
      #drop-zone:hover,
      #drop-zone.drag-over {
        opacity: 0.8;
      }
      #drop-zone i {
        font-size: 36px;
        color: var(--color-text-secondary);
        display: block;
        margin-bottom: 12px;
      }
      #drop-zone p {
        color: var(--color-text-secondary);
        font-size: 14px;
        margin-top: 6px;
      }
      #drop-zone strong {
        color: var(--color-text-primary);
        font-size: 15px;
        display: block;
      }
      #file-input {
        display: none;
      }

      button {
        margin-top: 10px;
        padding: 10px 20px;
        font-size: 1rem;
        background-color: var(--rust);
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      body {
        background: var(--cream);
        font-family: "Cormorant Garamond", Georgia, serif;
        color: var(--ink);
        min-height: 100vh;
        padding: 3rem 1.5rem 5rem;
        /* background-image:
              radial-gradient(ellipse at 20% 10%, #e8d9bf44 0%, transparent 50%),
              radial-gradient(ellipse at 80% 90%, #d4b89644 0%, transparent 50%),
              /* reverse */
        /* radial-gradient(ellipse at 20% 10%, #d4b89644 0%, transparent 50%), */
        /* radial-gradient(ellipse at 80% 90%, #e8d9bf44 0%, transparent 50%);  */
      }

      header {
        text-align: center;
        margin-bottom: 3rem;
      }

      header::before,
      header::after {
        content: "";
        display: block;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          var(--gold),
          transparent
        );
        margin: 0.9rem auto;
        width: 55%;
      }

      .family-name {
        font-family: "Playfair Display", Georgia, serif;
        font-size: clamp(2rem, 4.5vw, 3.6rem);
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--ink);
        line-height: 1;
      }

      .family-sub {
        font-size: 1rem;
        color: var(--muted);
        font-style: italic;
        letter-spacing: 0.1em;
        margin-top: 0.4rem;
      }

      .ornament {
        font-size: 1.3rem;
        color: var(--gold);
        display: block;
        margin: 0.5rem 0;
      }

      .grid-two-cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
        margin-top: 5px;
        /* margin-block: var(--vertical-connect-line-height); */
        width: 100%;
      }

      .line-right {
        border-right: var(--line-width) solid var(--line);
      }

      .couple {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: flex-start;
        /* display: grid; */
        /* minmax ensures the spouses are equal width, allowing us to know where the center of left spouse is */
        /* grid-template-columns: minmax(75px, 1fr) auto minmax(75px, 1fr); */
      }
      .spouse-left {
        width: 150px;
        display: flex;
        flex-direction: row;
        justify-content: flex-end;
      }
      .spouse-right {
        width: 150px;
        display: flex;
        flex-direction: row;
        justify-content: flex-start;
      }

      .siblings {
        display: flex;
        justify-content: center;
        flex-direction: row;
        align-items: flex-start;
        /* gap: 10px; */
      }

      /* vertical line above child */
      .photo:not(.is-spouse)::after {
        content: " ";
        position: absolute;
        top: calc(var(--vertical-connect-line-height) * -1);
        height: calc(var(--vertical-connect-line-height) * 1);
        left: 0;
        right: 50%;
        border-right: calc(var(--line-width) * 1) solid var(--line);
      }

      .couple-heart {
        width: var(--heart-width);
        font-size: 30px;
        margin-top: 10px;
        color: var(--rust);
        text-align: center;
      }

      .family-tree {
        width: fit-content;
        padding-right: 20px;
      }

      .family-node {
        padding-top: var(--vertical-connect-line-height);
        position: relative;
        /* fixed total height controls how tall the flexible lines between generations are. */
        /* the height includes the person card and the connecting lines */
        height: 130px;
        display: flex;
        align-items: center;
        flex-direction: column;
      }

      /* .family-node.single-child:not(.has-spouse) {
        padding-top: 0;
      } */

      .family-node.middle-child {
        /* for middle children, just a full top border */
        border-top: calc(var(--line-width) * 1) solid var(--line);
      }

      .family-node.first-of-children::after {
        content: " ";
        position: absolute;
        top: 0;
        height: calc(var(--vertical-connect-line-height) * 1);
        left: 50%;
        right: 0;
        border-top: calc(var(--line-width) * 1) solid var(--line);

        /* needed because the .photo vertical line is hidden by this absolute div */
        border-left: calc(var(--line-width) * 1) solid var(--line);
      }
      .family-node.first-of-children.has-spouse::after {
        /* move it to the left so that we're pointing to center of child spouse instead of
         center of couple (heart)   */
        left: calc(
          50% - var(--person-width) / 2 - var(--heart-width) / 2 -
            var(--person-margin)
        );
      }

      .family-node.last-of-children::after {
        content: " ";
        position: absolute;
        top: 0;
        height: calc(var(--vertical-connect-line-height) * 1);
        left: 0;
        right: 50%;
        border-top: calc(var(--line-width) * 1) solid var(--line);

        /* needed because the .photo vertical line is hidden by this absolute div */
        border-right: calc(var(--line-width) * 1) solid var(--line);
      }
      .family-node.last-of-children.has-spouse::after {
        /* move it to the left so that we're pointing to center of child spouse instead of
         center of couple (heart)   */
        right: calc(
          50% + var(--person-width) / 2 + var(--heart-width) / 2 +
            var(--person-margin)
        );
      }

      .family-node.single-child:not(.has-spouse) {
        /* for single children, no horizontal border */
        border-top: none;
      }

      .family-node.single-child.has-spouse::after {
        content: " ";
        position: absolute;
        top: 0;
        height: calc(var(--vertical-connect-line-height) * 1);
        /* for single-child couple, we want the top border from center of child spouse to couple heart center */
        left: calc(
          50% - var(--person-width) / 2 - var(--heart-width) / 2 -
            var(--person-margin)
        );
        right: 50%;
        border-top: calc(var(--line-width) * 1) solid var(--line);

        /* needed because the .photo vertical line is hidden by this absolute div */
        border-left: calc(var(--line-width) * 1) solid var(--line);
      }

      /* ── Person card ── */
      .person {
        display: flex;
        flex-direction: column;
        align-items: center;
        /* background-color: red; */
        /* width: 110px; */
        margin: 0 var(--person-margin);
        /* padding-bottom: 3px; */
        /* border-bottom: var(--line-width) solid var(--light-green); */
      }

      .photo {
        /* anchor for vertical lines ::after */
        position: relative;

        width: var(--person-width);
        /* padding: 10px; */
        height: var(--person-width);
        border-radius: 50%;
        background: var(--parchment);
        border: 2px solid var(--gold-lt);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Playfair Display", serif;
        font-size: 1.3rem;
        font-weight: 600;
        color: var(--brown);
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        /* uppercase the initials */
        text-transform: uppercase;
      }

      .photo::after {
        content: "";
        position: absolute;
        inset: 3px;
        border-radius: 50%;
        border: 1px solid rgba(201, 168, 76, 0.3);
        pointer-events: none;
      }

      /* generation-tinted photo rings */
      .gen-1 .photo {
        background: #e8d5b0;
        border-color: #c9a84c;
      }
      /* lighten spouse colors */
      /* .gen-1 .spouse-right .photo {
        background-color: color-mix(in srgb, #e8d5b0, white var(--spouse-lighten-pcnt));
        border-color: color-mix(in srgb, #c9a84c, white var(--spouse-lighten-pcnt));
      } */

      .gen-2 .photo {
        background: #d4e8d0;
        border-color: #7aad72;
      }
      .gen-2 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #d4e8d0,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #7aad72,
          white var(--spouse-lighten-pcnt)
        );
      }

      .gen-3 .photo {
        background: #d0dce8;
        border-color: #6a8fb0;
      }
      .gen-3 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #d0dce8,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #6a8fb0,
          white var(--spouse-lighten-pcnt)
        );
      }

      .gen-4 .photo {
        background: #e8d4e4;
        border-color: #b07aa0;
      }
      .gen-4 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #e8d4e4,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #b07aa0,
          white var(--spouse-lighten-pcnt)
        );
      }

      .gen-5 .photo {
        background: #d4d0e8;
        border-color: #7a72ad;
      }
      .gen-5 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #d4d0e8,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #7a72ad,
          white var(--spouse-lighten-pcnt)
        );
      }

      .gen-6 .photo {
        background: #efc1c1;
        border-color: #e8968c;
      }
      .gen-6 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #efc1c1,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #e8968c,
          white var(--spouse-lighten-pcnt)
        );
      }

      /* .gen-7 .photo { background: #d0e8d4; border-color: #72ad7a; } */

      .person-info {
        text-align: center;
        margin-top: 7px;
      }
      .spouse-left .person-info {
        text-align: right;
      }
      .spouse-right .person-info {
        text-align: left;
      }

      .person-name {
        font-family: "Playfair Display", Georgia, serif;
        font-size: 0.8rem;
        font-weight: 600;
        line-height: 1.2;
        color: var(--ink);

        /* ellipsis: "..."; */
        /* max-width: 150px; */
        /* white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis; */
      }

      .person-dates {
        font-size: 0.68rem;
        color: var(--muted);
        font-style: italic;
        margin-top: 2px;
        letter-spacing: 0.02em;
      }

      .person-note {
        font-size: 0.65rem;
        color: var(--rust);
        margin-top: 2px;
        font-style: italic;
      }

      /* ── Animations ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .person {
        animation: fadeUp 0.6s ease both;
      }

      .gen-1 .person {
        animation-delay: 0.05s;
      }

      .gen-2 .person {
        animation-delay: 0.15s;
      }

      .gen-3 .person {
        animation-delay: 0.25s;
      }

      .gen-4 .person {
        animation-delay: 0.35s;
      }

      .gen-5 .person {
        animation-delay: 0.45s;
      }

      .gen-6 .person {
        animation-delay: 0.55s;
      }

      /* .gen-7 .person { animation-delay: 0.65s; } */

      .person:hover .photo {
        transform: scale(1.08);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.14);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .photo {
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
    </style>
    <script>
      function getInitials(name) {
        const parts = name.split(" ").filter((part) => part.length > 0);
        if (parts.length >= 2) {
          const lastNameInitial = parts[1][0];
          // check that lastNameInitial is a ascii
          const isLastNameAscii = /[A-Za-z]/.test(lastNameInitial);
          const isLastNameRussian = /[А-Яа-яЁё]/.test(lastNameInitial);
          return (
            parts[0][0] +
            (isLastNameAscii || isLastNameRussian ? lastNameInitial : "")
          );
        } else {
          return name.slice(0, 1);
        }
      }
      function renderPersonStyle(person) {
        let style = "";
        if (person.color) {
          style += `color: ${person.color};`;
        }
        if (person.backgroundColor) {
          style += `background-color: ${person.backgroundColor};`;
        }
        return style;
      }
      function renderCouple(person, generation, isSingleOrMiddleChild) {
        let coupleHtml = `<div class="couple gen-${generation}">`;
        // person.spouse exists
        coupleHtml += `<div class="spouse-left">`;
        coupleHtml += `<div class="person" style="align-items: flex-end">`;
        coupleHtml += `<div class="photo">${getInitials(person.name)}</div>`;
        coupleHtml += `<div class="person-info"><div class="person-name" title="${person.name}">${person.name}</div></div>`;
        coupleHtml += `</div>`;
        coupleHtml += `</div>`;
        coupleHtml += `<div class="couple-heart">♥</div>`;
        coupleHtml += `<div class="spouse-right">`;
        coupleHtml += `<div class="person" style="align-items: flex-start">`;
        coupleHtml += `<div class="photo " style="${renderPersonStyle(person.spouse)}">${getInitials(person.spouse.name)}</div>`;
        coupleHtml += `<div class="person-info"><div class="person-name" title="${person.spouse.name}">${person.spouse.name}</div></div>`;
        coupleHtml += `</div>`;
        coupleHtml += `</div>`;
        coupleHtml += `</div>`;
        return coupleHtml;
      }
      function renderPerson(person, generation) {
        let personHtml = "";
        if (person.spouse) {
          personHtml += renderCouple(person, generation);
        } else {
          personHtml += `<div class="person gen-${generation}">`;
          personHtml += `<div class="photo" style="${renderPersonStyle(person)}">${getInitials(person.name)}</div>`;
          personHtml += `<div class="person-info"><div class="person-name" title="${person.name}">${person.name}</div></div>`;
          personHtml += `</div>`;
        }
        return personHtml;
      }
      function renderNode(
        node,
        generation = 1,
        isFirstChild = true,
        isLastChild = true,
      ) {
        // flex:1 ensure first/last family-node hugs left/right edge of .siblings div.
        // .siblings with multiple family-nodes has border-top, and we use connection-top-left/right-corner
        // to replace '---' edge with corners connecting to top center of family-node
        // ( '|--' for first,  '--|' for last family-node).
        let nodeHtml = "<div style='flex: 1;'>";

        const borderClass =
          generation == 1
            ? ""
            : isFirstChild && isLastChild
              ? "single-child"
              : isFirstChild
                ? "first-of-children"
                : isLastChild
                  ? "last-of-children"
                  : "middle-child";

        nodeHtml += `<div class="family-node ${borderClass} ${node.spouse ? "has-spouse" : ""}">`;

        nodeHtml += renderPerson(node, generation);

        if (node.children && node.children.length > 0) {
          nodeHtml += renderConnectionToChildren();
          nodeHtml += "</div>"; // close person + connection container div
          nodeHtml += `<div class="siblings">`;
          for (let i = 0; i < node.children.length; i++) {
            const child = node.children[i];
            const isFirstChild = i === 0;
            const isLastChild = i === node.children.length - 1;
            nodeHtml += renderNode(
              child,
              generation + 1,
              isFirstChild,
              isLastChild,
            );
          }
          nodeHtml += "</div>"; // close siblings container div
        } else {
          nodeHtml += "</div>"; // close person container div if no children
        }
        nodeHtml += "</div>";
        return nodeHtml;
      }
      function renderConnectionToChildren() {
        // flex:1 makes it take rest of family-node (person card + line)'s static height.
        // static height on family-node ensure all children align horizontally even
        // if person card heights differ between siblings, for example due to multi-line names.
        return `
                <div class="grid-two-cols" style="flex:1">
                    <div class="line-right"></div>
                    <div></div>
                </div>
                `;
      }
      function familyTreeJsonToHtml(title, subtitle, familyTree) {
        const rootNode = renderNode(familyTree);
        return (
          `
                <div class="family-tree">
      <header>
        <span class="ornament">✦</span>
        <h1 class="family-name">${title}</h1>
        <p class="family-sub">${subtitle}</p>
        <span class="ornament">✦</span>
      </header>` +
          rootNode +
          `</div>
                `
        );
      }

      const familyJson = {
        title: "The Smith Family",
        subtitle: "A record of four generations",
        name: "Grampa",
        spouse: {
          name: "Gramma",
        },
        children: [
          {

            },

              {

                      {

                      },

                      },
                    ],
                    // spouse: {
                    //   name: "GrandGrandChild00 spouse",
                    // },
                  },
                  //   {
                  //     name: "GrandGrandChild1",
                  //   },
                ],
              },
            ],
          },
          {
            name: "Child1",
            spouse: {
              name: "Child1 spouse",
            },
          },
          {
            name: "Child2",
            spouse: {
              name: "Child2 spouse",
            },
            children: [
              {
                name: "GrandChild1",
                children: [
                  {
                    name: "GrandGrandChild1",
                  },
                  {
                    name: "GrandGrandChild2",
                    children: [
                      {
                        name: "GreatGrandChild1",
                        spouse: {
                          name: "GreatGrandChild1 spouse",
                        },
                        children: [
                          {
                            name: "GreatGreatGrandChild1",
                          },
                          {
                            name: "GreatGreatGrandChild2",
                          },
                        ],
                      },
                      {
                        name: "GreatGrandChild2",
                        children: [
                          {
                            name: "GreatGreatGrandChild3",
                          },
                          {
                            name: "GreatGreatGrandChild4",
                          },
                        ],
                      },
                    ],
                  },
                ],
              },
              {
                name: "GrandChild1",
              },
            ],
          },
          {
            name: "Child3",
            spouse: {
              name: "Child3 spouse",
            },
          },
          {
            name: "Child4",
            spouse: {
              name: "Child4 spouse",
            },
            children: [
              {
                name: "GrandChild2",
                spouse: {
                  name: "GrandChild2 spouse",
                },
              },
              {
                name: "GrandChild3",
              },
              //   {
              //     name: "GrandChild4",
              //   },
            ],
          },
        ],
      };
    </script>

  <body>
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <i class="ti ti-file-upload" aria-hidden="true"></i>
      <strong>Drop your .json family file here</strong>
      <p>or click to browse — JSON format</p>
      <input type="file" id="file-input" accept=".json,text/plain" />
    </div>

    <div id="json-input">
      <!-- JSON data will be placed here, defaulting to the familyJson variable defined in the script -->
      <!-- multiline text input -->
      <textarea
        id="family-json-input"
        style="width: 100%; height: 500px"
      ></textarea>
    </div>

    <button onclick="updateFamilyTree()">Update Family Tree</button>
    <button onclick="exportAsHtml()">Export as HTML</button>
    <button onclick="openHTMLInNewTab()">Open in New Tab</button>
    <script>
      // handle file drag and drop for the drop zone
      const dropZone = document.getElementById("drop-zone");
      const fileInput = document.getElementById("file-input");
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("drag-over");
      });
      dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("drag-over"),
      );
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("drag-over");
        if (e.dataTransfer.files[0]) {
          readJsonFile(e.dataTransfer.files[0]);
        }
      });
      fileInput.addEventListener("change", (e) => {
        if (e.target.files[0]) readJsonFile(e.target.files[0]);
      });
      function readJsonFile(f) {
        const r = new FileReader();
        r.onload = (e) => {
          const prettyInput = JSON.stringify(
            JSON.parse(e.target.result),
            null,
            2,
          );
          document.getElementById("family-json-input").value = prettyInput;
          updateFamilyTree();
        };
        r.readAsText(f);
      }

      // parse the JSON from the textarea and update the family tree HTML
      function updateFamilyTree() {
        const input = document.getElementById("family-json-input").value;
        try {
          const parsedJson = JSON.parse(input);

          const title = parsedJson.title || "Family Tree";
          const subtitle = parsedJson.subtitle || "";
          document.getElementById("family-tree-container").innerHTML =
            familyTreeJsonToHtml(title, subtitle, parsedJson);
        } catch (e) {
          alert("Invalid JSON: " + e.message);
        }
      }
      // wrap the family tree HTML and styles for export
      function getWrappedHtmlForExport() {
        const htmlContent = document.getElementById(
          "family-tree-container",
        ).outerHTML;
        const style = document.querySelector("style").outerHTML;
        return `<!DOCTYPE html>
                <html>
                <head>
                <meta charset="UTF-8">
                <title>Family Tree</title>
                ${style}
                </head>
                <body>
                ${htmlContent}
                </body>
                </html>`;
      }
      // export the family tree as an HTML file
      function exportAsHtml() {
        const wrappedHtml = getWrappedHtmlForExport();
        const blob = new Blob([wrappedHtml], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "family_tree.html";
        a.click();
        URL.revokeObjectURL(url);
      }
      // open the family tree in a new tab
      function openHTMLInNewTab() {
        const wrappedHtml = getWrappedHtmlForExport();
        const blob = new Blob([wrappedHtml], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        window.open(url, "_blank");
      }
    </script>
    <div id="family-tree-container"></div>
    <script>
      // populate the textarea with the default JSON
      document.getElementById("family-json-input").value = JSON.stringify(
        familyJson,
        null,
        2,
      );
      updateFamilyTree();
    </script>
  </body>
</html>
