<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Family Tree</title>
    <style>
      :root {
        --cream: #f7f3ec;
        --parchment: #ede5d4;
        --ink: #1c1710;
        --brown: #6b4c2a;
        --rust: #a0522d;
        --gold: #c9a84c;
        --gold-lt: #e8d5a3;
        --line: #c4a87a;
        --muted: #7a6a54;
        --card-bg: #fffdf7;
        --light-green: #d4e8d0;
        --line-width: 1.5px;
        --vertical-connect-line-height: 20px;
        --loving-blue-color: #6a8fb0;
        --person-width: 64px;
        --heart-width: 18px;
        --person-margin: 5px;
        --spouse-lighten-pcnt: 40%;
        --border-radius: 7px;
        --family-node-height: 170px;
        --royal-blue: #617ac6;
        --color-border: #c4a87a;
        --color-border-secondary: #e8d5a3;
      }

      #note-modal {
        position: fixed;
        display: none;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.45);
        z-index: 9999;
      }

      #note-modal.open {
        display: block;
      }

      #spouse-families-modal {
        position: fixed;
        display: none;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.45);
        z-index: 9999;
      }

      #spouse-families-modal.open {
        display: block;
      }

      .note-modal-inner {
        background: var(--card-bg);
        border: 1px solid var(--gold-lt);
        border-radius: 10px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
        position: fixed;
        min-height: 20vh;
        max-height: 90vh;
        /* let child scroll */
        overflow: hidden;
        padding: 2rem;
        display: flex;
        flex-direction: column;

        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .note-modal-content {
        padding-top: 10px;
        padding-bottom: 10px;
        min-height: 0;
        flex: 1 1 auto;
        overflow-y: scroll;
        overflow-x: scroll;
      }

      .note-modal-close-mobile {
        display: none;
      }

      @media (max-width: 600px) {
        #note-modal {
          background: rgba(0, 0, 0, 0.2);
        }

        .note-modal-inner {
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          transform: none;
          max-height: 100vh;
          border-radius: 0;
          box-shadow: none;
          border: none;
          padding: 1.25rem;

          /* center content */
          display: flex;
          flex-direction: column;
          justify-content: center;
        }

        .note-modal-close {
          display: none;
        }

        .note-modal-close-mobile {
          display: block;
        }
      }

      .note-modal-close {
        position: absolute;
        top: 10px;
        right: 14px;
        cursor: pointer;
        font-size: 1.5rem;
        color: var(--muted);
      }

      .note-modal-close:focus-visible {
        outline: 2px solid var(--royal-blue);
        outline-offset: 2px;
        border-radius: 2px;
      }

      #drop-zone {
        border: 1.5px dashed var(--color-border-secondary);
        /* border-radius:12px; */
        margin-block: 10px;
        padding: 3rem 2rem;
        text-align: center;
        cursor: pointer;
        background: var(--parchment);
      }
      #drop-zone:hover,
      #drop-zone.drag-over {
        opacity: 0.8;
      }
      #drop-zone i {
        font-size: 36px;
        color: var(--color-text-secondary);
        display: block;
        margin-bottom: 12px;
      }
      #drop-zone p {
        color: var(--color-text-secondary);
        font-size: 14px;
        margin-top: 6px;
      }
      #drop-zone strong {
        color: var(--color-text-primary);
        font-size: 15px;
        display: block;
      }
      #file-input {
        display: none;
      }

      button {
        margin-top: 10px;
        padding: 10px 20px;
        font-size: 1rem;
        background-color: var(--rust);
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .button-small {
        padding: 6px 12px;
        font-size: 0.9rem;
      }

      .button-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 10px;
      }

      .royal-blue {
        background-color: var(--royal-blue);
      }

      select {
        padding: 8px 12px;
        font-size: 1rem;
        border: 1px solid var(--color-border-secondary);
        border-radius: 5px;
        background-color: white;
        color: var(--color-text-primary);
        cursor: pointer;
      }

      body {
        background: var(--cream);
        font-family: "Cormorant Garamond", Georgia, serif;
        color: var(--ink);
        min-height: 100vh;
        padding: 3rem 1.5rem 5rem;
        /* background-image:
              radial-gradient(ellipse at 20% 10%, #e8d9bf44 0%, transparent 50%),
              radial-gradient(ellipse at 80% 90%, #d4b89644 0%, transparent 50%),
              /* reverse */
        /* radial-gradient(ellipse at 20% 10%, #d4b89644 0%, transparent 50%), */
        /* radial-gradient(ellipse at 80% 90%, #e8d9bf44 0%, transparent 50%);  */
      }

      body.modal-open {
        overflow: hidden;
      }

      header {
        text-align: center;
        margin-bottom: 3rem;
      }

      header::before,
      header::after {
        content: "";
        display: block;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          var(--gold),
          transparent
        );
        margin: 0.9rem auto;
        width: 55%;
      }

      .family-name {
        font-family: "Playfair Display", Georgia, serif;
        font-size: 21px;  /* clamp(2rem, 4.5vw, 3.6rem);*/
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--ink);
        line-height: 1;
      }

      .family-sub {
        font-size: 1rem;
        color: var(--muted);
        font-style: italic;
        letter-spacing: 0.1em;
        margin-top: 0.4rem;
      }

      .ornament {
        font-size: 1.3rem;
        color: var(--gold);
        display: block;
        margin: 0.5rem 0;
      }

      .grid-two-cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
        margin-top: 5px;
        /* margin-block: var(--vertical-connect-line-height); */
        width: 100%;
      }

      .line-right {
        border-right: var(--line-width) solid var(--line);
      }

      .couple {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: flex-start;
        /* display: grid; */
        /* minmax ensures the spouses are equal width, allowing us to know where the center of left spouse is */
        /* grid-template-columns: minmax(75px, 1fr) auto minmax(75px, 1fr); */
      }
      .spouse-left {
        width: 150px;
        display: flex;
        flex-direction: row;
        justify-content: flex-end;
      }
      .spouse-right {
        width: 150px;
        display: flex;
        flex-direction: row;
        justify-content: flex-start;
      }

      .siblings {
        display: flex;
        justify-content: center;
        flex-direction: row;
        align-items: flex-start;
        /* gap: 10px; */
      }

      /* alternate background colors for siblings children */
      /* .siblings > div:nth-child(odd) {
        background-color: color-mix(in srgb, var(--cream), white 40%); */
      /* } */

      /* vertical line above child - doesn't work so commented out. see family-node ::after instead*/
      /* the rendered ::after is invisible, maybe z-index issues */
      /* .photo:not(.is-spouse)::after {
        content: "";
        position: absolute;
        top: calc(var(--vertical-connect-line-height) * -1);
        height: calc(var(--vertical-connect-line-height) * 1);
        left: 0;
        right: 50%;
        border-right: calc(var(--line-width) * 1) solid var(--line);
      } */

      .couple-heart {
        width: var(--heart-width);
        font-size: 30px;
        margin-top: 10px;
        color: var(--rust);
        text-align: center;
      }

      .family-tree {
        width: fit-content;
        padding-right: 20px;
        position: relative;
      }

      .family-node {
        min-width: 120px;
        padding-top: var(--vertical-connect-line-height);
        position: relative;
        /* fixed total height controls how tall the flexible lines between generations are. */
        /* the height includes the person card and the connecting lines */
        height: var(--family-node-height);
        display: flex;
        align-items: center;
        flex-direction: column;
      }

      .family-node.single-child:not(.has-spouse)::after {
        content: "";
        position: absolute;
        z-index: 1;
        top: 0;
        height: calc(var(--vertical-connect-line-height) * 1);
        left: 0;
        right: 50%;

        /* needed because the .photo vertical line is hidden by this absolute div */
        border-right: calc(var(--line-width) * 1) solid var(--line);
      }

      .family-node.middle-child {
        /* for middle children, a full top border */
        border-top: calc(var(--line-width) * 1) solid var(--line);
      }
      .family-node.middle-child::after {
        content: "";
        position: absolute;
        z-index: 1;
        top: 0;
        height: calc(var(--vertical-connect-line-height) * 1);
        left: 0;
        right: 50%;

        /* needed because the .photo vertical line is hidden by this absolute div */
        border-right: calc(var(--line-width) * 1) solid var(--line);
      }
      .family-node.middle-child.has-spouse::after {
        /* move it to the left so that we're pointing to center of child spouse instead of
         center of couple (heart)   */
        right: calc(
          50% + var(--person-width) / 2 + var(--heart-width) / 2 +
            var(--person-margin)
        );
      }

      .family-node.first-of-children::after {
        content: "";
        position: absolute;
        z-index: 1;
        top: 0;
        /* subtract line-width to account for top border */
        height: calc(
          var(--vertical-connect-line-height) * 1 - var(--line-width)
        );
        left: 50%;
        right: 0;
        border-top: calc(var(--line-width) * 1) solid var(--line);

        /* needed because the .photo vertical line is hidden by this absolute div */
        border-left: calc(var(--line-width) * 1) solid var(--line);
        border-top-left-radius: var(--border-radius);
      }
      .family-node.first-of-children.has-spouse::after {
        /* move it to the left so that we're pointing to center of child spouse instead of
         center of couple (heart)   */
        left: calc(
          50% - var(--person-width) / 2 - var(--heart-width) / 2 -
            var(--person-margin)
        );
      }

      .family-node.last-of-children::after {
        content: "";
        position: absolute;
        z-index: 1;
        top: 0;
        /* subtract line-width to account for top border */
        height: calc(
          var(--vertical-connect-line-height) * 1 - var(--line-width)
        );
        left: 0;
        right: 50%;
        border-top: calc(var(--line-width) * 1) solid var(--line);

        /* needed because the .photo vertical line is hidden by this absolute div */
        border-right: calc(var(--line-width) * 1) solid var(--line);
        border-top-right-radius: var(--border-radius);
      }
      .family-node.last-of-children.has-spouse::after {
        /* move it to the left so that we're pointing to center of child spouse instead of
         center of couple (heart)   */
        right: calc(
          50% + var(--person-width) / 2 + var(--heart-width) / 2 +
            var(--person-margin)
        );
      }

      .family-node.single-child.has-spouse::after {
        content: "";
        position: absolute;
        z-index: 1;
        top: 0;
        /* subtract line-width to account for top border */
        height: calc(
          var(--vertical-connect-line-height) * 1 - var(--line-width)
        );
        /* for single-child couple, we want the top border from center of child spouse to couple heart center */
        left: calc(
          50% - var(--person-width) / 2 - var(--heart-width) / 2 -
            var(--person-margin)
        );
        right: 50%;
        border-top: calc(var(--line-width) * 1) solid var(--line);

        /* needed because the .photo vertical line is hidden by this absolute div */
        border-left: calc(var(--line-width) * 1) solid var(--line);
        border-top-left-radius: var(--border-radius);
      }

      /* ── Person card ── */
      .person {
        display: flex;
        flex-direction: column;
        align-items: center;
        /* background-color: red; */
        /* width: 110px; */
        margin: 0 var(--person-margin);
        /* padding-bottom: 3px; */
        /* border-bottom: var(--line-width) solid var(--light-green); */
      }

      .more-info-available .photo::before {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: 50%;
        border: 3px solid var(--color-border);
        pointer-events: default;
        cursor: pointer;
      }

      .photo {
        /* anchor for vertical lines ::after */
        position: relative;

        width: var(--person-width);
        /* padding: 10px; */
        height: var(--person-width);
        border-radius: 50%;
        background: var(--parchment);
        border: 2px solid var(--gold-lt);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Playfair Display", serif;
        font-size: 1.3rem;
        font-weight: 600;
        color: var(--brown);
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        /* uppercase the initials */
        text-transform: uppercase;
      }

      .photo::after {
        content: "";
        position: absolute;
        inset: 3px;
        border-radius: 50%;
        border: 1px solid rgba(201, 168, 76, 0.3);
        pointer-events: none;
      }

      /* generation-tinted photo rings */
      .gen-1 .photo {
        background: #e8d5b0;
        border-color: #c9a84c;
      }
      /* lighten spouse colors */
      /* .gen-1 .spouse-right .photo {
        background-color: color-mix(in srgb, #e8d5b0, white var(--spouse-lighten-pcnt));
        border-color: color-mix(in srgb, #c9a84c, white var(--spouse-lighten-pcnt));
      } */

      .gen-2 .photo {
        background: #d4e8d0;
        border-color: #7aad72;
      }
      .gen-2 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #d4e8d0,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #7aad72,
          white var(--spouse-lighten-pcnt)
        );
      }

      .gen-3 .photo {
        background: #d0dce8;
        border-color: #6a8fb0;
      }
      .gen-3 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #d0dce8,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #6a8fb0,
          white var(--spouse-lighten-pcnt)
        );
      }

      .gen-4 .photo {
        background: #e8d4e4;
        border-color: #b07aa0;
      }
      .gen-4 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #e8d4e4,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #b07aa0,
          white var(--spouse-lighten-pcnt)
        );
      }

      .gen-5 .photo {
        background: #d4d0e8;
        border-color: #7a72ad;
      }
      .gen-5 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #d4d0e8,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #7a72ad,
          white var(--spouse-lighten-pcnt)
        );
      }

      .gen-6 .photo {
        background: #efc1c1;
        border-color: #e8968c;
      }
      .gen-6 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #efc1c1,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #e8968c,

        );
      }

      /* .gen-7 .photo { background: #d0e8d4; border-color: #72ad7a; } */

      .person-info {
        text-align: center;
        margin-top: 7px;

        /* allow multiline text but cut off with ellipsis */
        display: -webkit-box;
        -webkit-line-clamp: 10;
        line-clamp: 10;

      }
      .spouse-left .person-info {

      .spouse-right .person-info {

      .person-name {
        font-family: "Playfair Display", Georgia, serif;
        font-size: 0.8rem;
        font-weight: 600;

        color: var(--ink);

        /* ellipsis: "..."; */
        /* max-width: 150px; */
        /* white-space: nowrap;

      }

      .person-dates {

      }

      .person-occupation {

      }

      .person-note {
        margin-top: 4px;

        font-style: italic;
      }

      /* .person-note:focus-visible {
        outline: 2px solid var(--royal-blue);
        outline-offset: 2px;
        border-radius: 2px;
      } */

      .person-marriage-branch {
        margin-top: 3px;
        padding: 1px 6px;
        border: 1px solid var(--gold-lt);

        background: color-mix(in srgb, var(--gold-lt), white 55%);

      }

      .couple-family-skipped {

        background: color-mix(in srgb, var(--gold-lt), white 65%);
        letter-spacing: 0.03em;
        display: inline-block;
      }

      /* ── Animations ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .person {
        animation: fadeUp 0.6s ease both;
      }

      .gen-1 .person {
        animation-delay: 0.05s;
      }

      .gen-2 .person {

      .gen-3 .person {

        animation-delay: 0.35s;
      }

      .gen-5 .person {
        animation-delay: 0.45s;

      .gen-6 .person {
        animation-delay: 0.55s;
      }

      /* .gen-7 .person { animation-delay: 0.65s; } */

      .person:hover .photo {
        transform: scale(1.08);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.14);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .person:focus {
        outline: none;
      }

      .person:focus .photo,
      .person:focus-visible .photo {
        transform: scale(1.08);
        box-shadow:
          0 0 0 3px var(--royal-blue),

      }

      .photo {
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
    </style>
    <script>
      function getInitials(name) {
        const parts = (name || "").split(" ").filter((part) => part.length > 0);
        if (parts.length >= 2) {
          const lastNameInitial = parts[1][0];
          // check that lastNameInitial is a ascii
          const isLastNameAscii = /[A-Za-z]/.test(lastNameInitial);
          const isLastNameRussian = /[А-Яа-яЁё]/.test(lastNameInitial);
          return (
            parts[0][0] +
            (isLastNameAscii || isLastNameRussian ? lastNameInitial : "")
          );
        } else {
          return (name || "").slice(0, 1);
        }
      }
      function renderPersonStyle(person) {
        let style = "";
        if (person.color) {
          style += `color: ${person.color};`;
        }
        if (person.backgroundColor) {
          style += `background-color: ${person.backgroundColor};`;
        }
        return style;
      }

      function escapeHtmlAttr(value, mode = "html") {
        const rawValue = String(value);
        if (mode === "selector") {
          return window.CSS && typeof CSS.escape === "function"
            ? CSS.escape(rawValue)
            : rawValue.replace(/\\/g, "\\\\").replace(/"/g, '\\"');
        }
        return rawValue
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function renderCouple(person, generation, isSingleOrMiddleChild) {
          const rootAttrs = generation === 1 ? " root-family" : "";
          const rootTabIndex = generation === 1 ? " tabindex='0'" : "";
        const personIdAttr = person.personId
          ? ` data-person-id="${escapeHtmlAttr(person.personId)}"`
          : "";
        let coupleHtml = `<div class="couple gen-${generation}">`;
        // person.spouse exists
        coupleHtml += `<div class="spouse-left">`;
        coupleHtml += `<div class="person ${rootAttrs} ${renderMoreInfoClass(person)}" style="align-items: flex-end;" ${renderMoreInfoAttributes(person)} ${rootTabIndex}${personIdAttr}> `;
        coupleHtml += `<div class="photo">${getInitials(person.name)}</div>`;
        coupleHtml += `<div class="person-info"><div class="person-name" title="${person.name}">${person.name}</div>`;
        if (person.marriageLabel)
          coupleHtml += `<div class="person-marriage-branch">${person.marriageLabel}</div>`;
        if (person.dates)
          coupleHtml += `<div class="person-dates">${person.dates}</div>`;
        if (person.occupation)
          coupleHtml += `<div class="person-occupation" title="${person.occupation}">${person.occupation}</div>`;
        coupleHtml += renderPersonNote(person);
        coupleHtml += `</div>`; // close person-info div
        coupleHtml += `</div>`; // close person div
        coupleHtml += `</div>`; // close spouse-left div
        coupleHtml += `<div class="couple-heart">♥</div>`;
        coupleHtml += `<div class="spouse-right">`;
        coupleHtml += `<div class="person ${renderMoreInfoClass(person.spouse)}" style="align-items: flex-start;" ${renderMoreInfoAttributes(person.spouse)}>`;

      // ── GEDCOM Parser ─────────────────────────────────────────────────────

      function parseNote(value, i, lines) {
        const noteLines = value? [value] : [];
        while (i + 1 < lines.length) {
          const nextRaw = lines[i + 1].trim();
          const mNext = nextRaw.match(/^(\d+)\s+(\S+)(?:\s+(.*))?$/);
          if (!mNext) break;
          const nextLevel = parseInt(mNext[1]);
          const nextTag = mNext[2].toUpperCase();
          const nextValue = (mNext[3] || "").trim();
          // console.log("looking for CONC/CONT, found:", { nextLevel, nextTag, nextValue });
          if (nextTag === "CONC" && (nextLevel >= 1 && nextLevel <= 2)) {
            if (nextValue === "") {
              // console.log("CONC with empty value, adding newline");
              noteLines.push("\n"); // use <br> to represent newlines in HTML
            } else {
              noteLines.push(nextValue);
            }
            i++;
          } else if (nextTag === "CONT" && (nextLevel >= 1 && nextLevel <= 2)) {
            if (nextValue === "") {
              // console.log("CONT with empty value, adding newline");
              noteLines.push("\n"); // use <br> to represent newlines in HTML
            } else {
              noteLines.push(nextValue);
            }
            i++;
          } else {
            break;
          }
        }
        return {i, note: noteLines.join(" ")};
      }
      function parseGedcom(text) {
        const individuals = {};
        const families = {};
        const notes = {};
        if (!text || typeof text !== "string") {
          return { individuals, families };
        }
        const lines = text.split(/\r?\n/);
        let rec = null;
        let subTag = null;

        for (let i = 0; i < lines.length; i++) {
          let raw = lines[i];
          raw = raw.trim();
          if (!raw) continue;
          const m = raw.match(/^(\d+)\s+(?:(@[^@]+@)\s+)?(\S+)(?:\s+(.*))?$/);
          if (!m) continue;
          const level = parseInt(m[1]);
          const xref = m[2] ? m[2].replace(/@/g, "") : null;
          const tag = m[3].toUpperCase();
          const value = (m[4] || "").trim();

          if (level === 0) {
            subTag = null;
            if (tag === "NOTE" && xref) {
                const noteResult = parseNote(value, i, lines);
                i = noteResult.i;
              // handle standalone NOTE records that aren't attached to an individual or family,
              // by looking them up in the notes object which we populated while parsing INDI records with NOTE tag.
              if (notes[xref]?.rec) {
                const rec = notes[xref].rec;
                rec.note = noteResult.note;
              } else {
                console.warn("NOTE record found with id:", xref, "but no individual or family record references it. Ignoring this note.");
                // store the note text anyway, in case we find an individual or family record later that references this note id.
                // This allows notes to be defined before the records that reference them, which is valid GEDCOM.
                notes[xref] = { note: noteResult.note };
              }
            } else if (tag === "INDI" && xref) {
              rec = { type: "INDI", id: xref, famcList: [], famsList: [] };
              individuals[xref] = rec;
            } else if (tag === "FAM" && xref) {
              rec = { type: "FAM", id: xref, chilIds: [] };
              families[xref] = rec;
            } else {
              rec = null;
            }
            continue;
          }

          if (!rec) continue;
          if (level === 1) subTag = tag;

          if (rec.type === "INDI") {
            if (tag === "NAME" && level === 1) {
              if (!rec.name) {
                // some records contain "NAME //", don't override existing name with blanks
                rec.name = value
                  .replace(/\//g, " ")
                  .replace(/\s+/g, " ")
                  .trim();
              }
            } else if (tag === "SEX" && level === 1) {
              rec.sex = value;
            } else if (tag === "BIRT" && level === 1) {
              rec.birth = rec.birth || {};
            } else if (tag === "DEAT" && level === 1) {
              rec.death = rec.death || {};
            } else if (tag === "DATE" && level === 2) {
              if (subTag === "BIRT") {
                rec.birth = rec.birth || {};
                rec.birth.date = value;
              } else if (subTag === "DEAT") {
                rec.death = rec.death || {};
                rec.death.date = value;
              }
            } else if (tag === "PLAC" && level === 2) {
              if (subTag === "BIRT") {
                rec.birth = rec.birth || {};
                rec.birth.place = value;
              } else if (subTag === "DEAT") {
                rec.death = rec.death || {};
                rec.death.place = value;
              }
            } else if ( tag === 'OCCU' && level === 1) {
              rec.occupation = value;
            } else if (tag === "NOTE" && level === 1) {
              // if note looks like an id, store it as noteId and look up the actual note text later
              if (/^@[^@]+@$/.test(value)) {
                const noteId = value.replace(/@/g, "");
                if (notes[noteId]?.note) {
                  // if we already have the note text for this note id (for example from a standalone NOTE record that we parsed earlier),
                  // attach it to this record now
                  rec.note = notes[noteId].note;
                } else {
                  // otherwise, store the noteId on this record, and when we later encounter a standalone NOTE record with this id,
                  // we'll attach the note text to this record then
                  // console.warn("record with NOTE tag found referencing note id:", noteId, "but we haven't parsed a standalone NOTE record with this id yet. Storing the note id on this record and will look up the note text later when we parse a standalone NOTE record with this id.");
                  notes[noteId] = { rec };
                }
              } else {
                // Look ahead for CONC and CONT lines to concatenate
                const noteResult = parseNote(value, i, lines);
                i = noteResult.i;
                rec.note = noteResult.note;
              }
            }
          } else if (rec.type === "FAM") {
            if (tag === "HUSB" && level === 1) {
              rec.husbId = value.replace(/@/g, "");
            } else if (tag === "WIFE" && level === 1) {
              rec.wifeId = value.replace(/@/g, "");
            } else if (tag === "CHIL" && level === 1) {
              rec.chilIds.push(value.replace(/@/g, ""));
            } else if (tag === "MARR" && level === 1) {
              rec.marr = rec.marr || {};
            } else if (tag === "DATE" && level === 2 && subTag === "MARR") {
              rec.marr = rec.marr || {};
              rec.marr.date = value;
            }
          }
        }

        // go through families, and add to famcList for individuals appearing in childIds,
        // and to famsList for individuals appearing in husbId/wifeId
        for (const fam of Object.values(families)) {
          for (const childId of fam.chilIds) {
            const child = individuals[childId];
            if (child) {
              child.famcList.push(fam.id);
            } else {
              console.warn(
                "no individual found for child id:",
                childId,
                "in family:",
                fam.id,
              );
            }
          }
          if (fam.husbId) {
            const husb = individuals[fam.husbId];
            if (husb) {
              husb.famsList.push(fam.id);
            } else {
              console.warn(
                "no individual found for husband id:",
                fam.husbId,
                "in family:",
                fam.id,
              );
            }
          }
          if (fam.wifeId) {
            const wife = individuals[fam.wifeId];
            if (wife) {
              wife.famsList.push(fam.id);
            } else {
              console.warn(
                "no individual found for wife id:",
                fam.wifeId,
                "in family:",
                fam.id,
              );
            }
          }
        }
        // make sure famcList and famsList are unique and don't contain null/undefined values
        for (const indi of Object.values(individuals)) {
          indi.famcList = Array.from(
            new Set((indi.famcList || []).filter((id) => id)),
          );
          indi.famsList = Array.from(
            new Set((indi.famsList || []).filter((id) => id)),
          );
        }
        return { individuals, families };
      }

      function gedcomFormatDates(birth, death) {
        const b = birth && birth.date ? birth.date : null;
        const d = death && death.date ? death.date : null;
        if (b && d) return b + " \u2013 " + d;
        if (b) return "b.\u00a0" + b;
        if (d) return "d.\u00a0" + d;
        return "";
      }

      function gedcomToTree(individuals, families) {
        const familyIds = new Set();

        function buildNodeVariants(personId, pathVisited = new Set()) {
          if (!personId) return [];
          const person = individuals[personId];
          if (!person) {
            console.warn("no person found for id:", personId);
            return [];
          }

          const baseNode = {
            personId,
            name:
              person.name ||
              "Unknown no name: " + `id: ${person.id || "no id"}`
          };
          const dates = gedcomFormatDates(person.birth, person.death);
          if (dates) baseNode.dates = dates;
          if (person.occupation) baseNode.occupation = person.occupation;
          if (person.note) baseNode.note = person.note;

          // filter to those ids in famsList that actually exist in families, in case some GEDCOM files have dangling references
          const famIds = (person.famsList || []).filter(
            (famId) => families[famId],
          );

          const variants = [];
          for (let idx = 0; idx < famIds.length; idx++) {
            const famId = famIds[idx];

            const visitKey = `${personId}|${famId}`;
            if (pathVisited.has(visitKey)) {
              // console.log("already visited person-family combination, skipping to avoid circular loop:", visitKey, person.name);
              continue;
            }

            const fam = families[famId];
            const node = { ...baseNode, familyId: famId }; // , name: baseNode.name.replace(/\s*\(root \d+\)$/, "") + " " + visitKey }; // remove "(root i)" from variants below root level
            if (famIds.length > 1) {
              node.marriageLabel = `Marriage ${idx + 1} of ${famIds.length}`;
            }

            const spouseId = fam.husbId === personId ? fam.wifeId : fam.husbId;
            if (spouseId) {
              const spouse = individuals[spouseId];
              if (spouse) {
                node.spouse = {
                  name:
                    spouse.name ||
                    "Unknown spouse no name: " + `id: ${spouse.id || "no id"}`,
                  personId: spouseId,
                  familyId: famId,
                };
                const spouseDates = gedcomFormatDates(
                  spouse.birth,
                  spouse.death,
                );
                if (spouseDates) node.spouse.dates = spouseDates;
                if (spouse.occupation) node.spouse.occupation = spouse.occupation;
                if (spouse.note) node.spouse.note = spouse.note;
              }
            }

            if (familyIds.has(famId)) {
              // console.log("already rendered this family in another root, skipping to avoid duplicate family trees:", famId, person.name);
              // mark that we skipped rendering this family to avoid duplicate trees,
              // so that we can optionally indicate this in the UI if needed
              node.familySkipped = true;
              variants.push(node);
            } else {
              familyIds.add(famId);

              const nextVisited = new Set(pathVisited);
              nextVisited.add(visitKey);
              // console.log('visiting person-family combination:', visitKey, person.name, "spouseId:", spouseId, "spouse name:", node.spouse ? node.spouse.name : "no spouse");
              // if (spouseId) {
              //   pathVisited.add(`${spouseId}|${famId}`);
              //   console.log('also marking spouse-family combination as visited to avoid duplicate variant:', `${spouseId}|${famId}`);
              // }

              const children = [];
              for (const childId of fam.chilIds || []) {
                children.push(...buildNodeVariants(childId, nextVisited));
              }
              if (children.length > 0) node.children = children;

              variants.push(node);
            }
          }

          return variants.length > 0 ? variants : [baseNode];
        }

        const roots = getRootIndividuals(individuals, families);
        
        // sort roots by number of generations in their tree (descending), so that bigger trees are rendered first and get the top position on the page
        roots.sort((a, b) => {
          const aTreeSize = getTreeSize(individuals, families, a.id, new Set());
          const bTreeSize = getTreeSize(individuals, families, b.id, new Set());
          return bTreeSize - aTreeSize;
        });

        const trees = [];

         // to track families that have been rendered under any root, to avoid rendering the same root family
        const rootFamilyIds = new Set();
        for (const root of roots) {
           // clear visited family ids for each root,
           // so that we can render same families under different roots.
           // This is now ok since we show only one root at a time with pagination,
           // so duplicate families won't appear on the same page.
           // duplication under *same* root is still prevented.
          familyIds.clear();

          const familyNodes = buildNodeVariants(root.id);
          for (const familyNode of familyNodes) {
            if (familyNode.familyId) {
              if (rootFamilyIds.has(familyNode.familyId)) {
                continue;
              }
              rootFamilyIds.add(familyNode.familyId);
            }
            trees.push(familyNode);
          }
        }
        return trees;
      }

      // get root family ids highest in the tree for a given individual.
      // if the person has no parents (famcList is empty), they are a root — return their own famsList.
      function getRootFamilyIdsForIndividual(personId, individuals, families, visited = new Set()) {
        // check cache
        if (personRootFamilyIdsCache[personId]) {
          return personRootFamilyIdsCache[personId];
        }

        const rootFamilyIds = new Set();
         // avoid infinite loops in case of circular references
        if (visited.has(personId)) return [];
        visited.add(personId);
        const person = individuals[personId];
        if (!person) return [];

        const famcList = (person.famcList || []).filter((id) => families[id]);
        if (famcList.length === 0) {
          // this person is a root — return their own family IDs
          (person.famsList || []).filter((id) => families[id]).forEach((id) => rootFamilyIds.add(id));
          const result = Array.from(rootFamilyIds);
          personRootFamilyIdsCache[personId] = result;
          return result;
        }

        for (const famId of famcList) {
          const fam = families[famId];
          if (fam) {
            const parentIds = [fam.husbId, fam.wifeId].filter((id) => id);

            // root family of personId is the combination of root families of their parents
            for (const parentId of parentIds) {
              const parentRootFamilyIds = getRootFamilyIdsForIndividual(parentId, individuals, families, visited);
              parentRootFamilyIds.forEach((id) => rootFamilyIds.add(id));
            }
          }
        }
        const result = Array.from(rootFamilyIds);
        // cache result before returning, so that if we encounter the same personId again during this recursive process, we can return the
        personRootFamilyIdsCache[personId] = result;
        return result;
      }

      function getRootIndividuals(individuals, families) {
        const roots = [];
        for (const individual of Object.values(individuals)) {
          const childFamcIds = (individual.famcList || []).filter(
            (famId) => families[famId],
          );
          if (childFamcIds.length > 0) {
            // console.log('individual has parents, skipping as root:', individual.id, individual.name);
            // console.log("full record", individual);
            continue;
          }
          // roots.push(individual);
          const spouseFamIds = (individual.famsList || []).filter(
            (famId) => families[famId],
          );
          let hasAncestor = false;
          for (const famId of spouseFamIds) {
            const fam = families[famId];
            const spouseId =
              fam.husbId === individual.id ? fam.wifeId : fam.husbId;
            const spouse = individuals[spouseId];
            if (spouse) {
              const spouseFamcIds = (spouse.famcList || []).filter(
                (famId) => families[famId],
              );
              if (spouseFamcIds.length > 0) {
                hasAncestor = true;
                // console.log('spouse has parents, so individual is not a root. individual: ', individual.id, individual.name, ", spouse: ", spouse.id, spouse.name);
                break;
              }
            }
          }
          if (!hasAncestor) {
            // console.log("adding root individual:", individual.id, individual.name);
            roots.push(individual);
          }
        }
        return roots;
      }

      function getTreeSize(individuals, families, personId, visited = new Set()) {
        if (visited.has(personId)) return 0; // avoid infinite loops in case of circular references
        visited.add(personId);
        const person = individuals[personId];
        if (!person) return 0;
        let size = 1; // count self
        const famIds = (person.famsList || []).filter(
          (famId) => families[famId],
        );
        for (const famId of famIds) {
          const fam = families[famId];
          const spouseId = fam.husbId === personId ? fam.wifeId : fam.husbId;
          if (spouseId) {
            size += 1; // count spouse
            size += getTreeSize(individuals, families, spouseId, visited);
          }
          for (const childId of fam.chilIds || []) {
            size += getTreeSize(individuals, families, childId, visited);
          }
        }
        return size;
      }
    </script>

              option.textContent = `📚 Fictional Characters: ${name}`;

              option.textContent = `🗣️ Languages: ${name}`;
            } else if (category.includes("misc")) {
              option.textContent = `🔀 Misc: ${name}`;
            } else if (category.includes("politicians") || category.includes("writers") || category.includes("scientists")) {
              option.textContent = `👩‍🔬 Politicians/Writers/Scientists: ${name}`;
            } else if (category.includes("religious")) {
              option.textContent = `⛪ Religious Figures/Systems: ${name}`;

              option.textContent = `👑 Royalty: ${name}`;

              option.textContent = name;

            document.getElementById("public-gedcom-select").appendChild(option);

          function syncSelectWithUrlParam() {
            const selectOption = (optionValue) => {
              const select = document.getElementById("public-gedcom-select");
              for (const option of select.options) {
                if (option.value === optionValue) {
                  option.selected = true;
                  break;
                }
              }
            };

            const select = document.getElementById("public-gedcom-select");
            // sync select value with URL param on page load, to reflect the currently loaded GEDCOM file if it is from the public samples list
            const sourceParam = new URL(window.location.href).searchParams.get("source");
            const urlParam = new URL(window.location.href).searchParams.get("url");

            if (otherSourceValues.includes(sourceParam)) {
              selectOption(sourceParam);
              return;
            }

            if (!sourceParam && !urlParam) {
              // select default family option
              selectOption("sample_family");
              return;
            }

            if (urlParam) {
              // if URL param is present, try to find a matching option with that URL
              selectOption(urlParam);
            }
          }

      }

      function findPersonElementById(personId) {
        if (!personId) return null;
        const escapedPersonId = escapeHtmlAttr(personId, "selector");
        return document.querySelector(
          `#family-tree-container .person[data-person-id="${escapedPersonId}"]`,
        );
      }

      function focusPersonById(personId) {
        const personEl = findPersonElementById(personId);
        if (!personEl) return false;
        if (!personEl.hasAttribute("tabindex")) {
          personEl.setAttribute("tabindex", "-1");
        }
        personEl.focus({ preventScroll: true });
        personEl.scrollIntoView({ behavior: "smooth", block: "center", inline: "nearest" });
        return true;
      }

      function setFamilyPage(pageIndex) {
        if (!activeRootFamilyTrees.length) return;
        const maxIndex = activeRootFamilyTrees.length - 1;
        activeFamilyPageIndex = Math.min(Math.max(pageIndex, 0), maxIndex);
        for (const key of Object.keys(personRootFamilyIdsCache)) {
          delete personRootFamilyIdsCache[key];
        }
        precomputeSpouseRootFamilyIds(activeRootFamilyTrees[activeFamilyPageIndex]);
        // Sync URL param for deep linking
        const tree = activeRootFamilyTrees[activeFamilyPageIndex];
        const paramValue = tree && tree.familyId ? tree.familyId : String(activeFamilyPageIndex);
        const url = new URL(window.location.href);
        url.searchParams.set("family", paramValue);
        history.replaceState(null, "", url.toString());
        document.getElementById("family-tree-container").innerHTML =
          familyTreeJsonToHtml(
            activeFamilyTitle,
            activeFamilySubtitle,
            activeRootFamilyTrees,
            activeFamilyPageIndex,
          );
        requestAnimationFrame(() => {
          const personIdFromUrl = getPersonIdFromUrl();
          if (personIdFromUrl && focusPersonById(personIdFromUrl)) {
            return;
          }

          console.log('focusing root family element for page index:', activeFamilyPageIndex);
          const rootFamilyEl = document.querySelector("#family-tree-container .person.root-family");
          if (rootFamilyEl) {
            console.log('found root family element, setting focus:', rootFamilyEl);
            rootFamilyEl.focus();
            rootFamilyEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
          }
        });
      }

      function prevFamilyPage() {
        setFamilyPage(activeFamilyPageIndex - 1);
      }

      function nextFamilyPage() {
        setFamilyPage(activeFamilyPageIndex + 1);
      }

      function initializeFamilyPaging(title, subtitle, familyTrees) {
        activeFamilyTitle = title || "Family Tree";
        activeFamilySubtitle = subtitle || "";
        activeRootFamilyTrees = Array.isArray(familyTrees) ? familyTrees : [familyTrees];

        rootFamilyIdToIndexMap.clear();
        activeRootFamilyTrees.forEach((tree, index) => {
          if (tree.familyId) {
            rootFamilyIdToIndexMap.set(tree.familyId, index);
          }
        });

        // Read initial family page from URL param
        const familyUrlParam = new URL(window.location.href).searchParams.get("family");
        let startIndex = 0;
        if (familyUrlParam !== null) {
          if (rootFamilyIdToIndexMap.has(familyUrlParam)) {
            startIndex = rootFamilyIdToIndexMap.get(familyUrlParam);
          } else {
            const n = parseInt(familyUrlParam, 10);
            if (!isNaN(n) && n >= 0 && n < activeRootFamilyTrees.length) {
              startIndex = n;
            }
          }
        }

        // if no valid family page param, but there's a personId param,
        // try to find the 1st root family page that contains that person
        const personIdParam = getPersonIdFromUrl();
        if (!familyUrlParam && personIdParam && activeIndividuals[personIdParam]) {
          const personRootFamilyIds = getRootFamilyIdsForIndividual(
            personIdParam,
            activeIndividuals,
            activeFamilies,
          ).filter((id) => rootFamilyIdToIndexMap.has(id));
          if (personRootFamilyIds.length > 0) {
            startIndex = rootFamilyIdToIndexMap.get(personRootFamilyIds[0]);
          }
        }

        activeFamilyPageIndex = 0;
        setFamilyPage(startIndex);
      }

      function goToRootFamilyId(familyId) {
        const url = new URL(window.location.href);
        url.searchParams.set("family", familyId);
        window.location.href = url.toString();
      }

      function goToRootFamilyIdForPerson(familyId, personId) {
        const url = new URL(window.location.href);
        url.searchParams.set("family", familyId);
        if (personId) {
          url.searchParams.set("personId", personId);
        } else {
          url.searchParams.delete("personId");
        }
        window.location.href = url.toString();
      }

      function resetNotesStore() {
        notesById = {};
        nextNoteId = 1;
      }

      function registerNoteText(noteText) {
        if (!noteText) return "";
        const noteId = `note-${nextNoteId++}`;
        notesById[noteId] = noteText;
        return noteId;
      }

      function populateNotesStore(data) {
        resetNotesStore();

        function walkPerson(person) {
          if (!person || typeof person !== "object") return;

          if (person.note) {
            person.noteId = registerNoteText(person.note);
          } else {
            delete person.noteId;
          }

          if (person.spouse && typeof person.spouse === "object") {
            if (person.spouse.note) {
              person.spouse.noteId = registerNoteText(person.spouse.note);
            } else {
              delete person.spouse.noteId;
            }
          }

          if (Array.isArray(person.children)) {
            for (const child of person.children) {
              walkPerson(child);
            }
          }
        }

        if (Array.isArray(data)) {
          for (const tree of data) {
            walkPerson(tree);
          }
          return;
        }

        if (data && typeof data === "object") {
          walkPerson(data);
        }
      }

      dropZone.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          fileInput.click();
        }
      });

      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("drag-over");
      });
      dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("drag-over"),
      );
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("drag-over");
        if (e.dataTransfer.files[0]) readFamilyFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener("change", (e) => {
        if (e.target.files[0]) readFamilyFile(e.target.files[0]);
      });

      function isGedcomFile(f) {
        return /\.(ged|gedcom)$/i.test(f.name);
      }

      function readFamilyFile(f) {
        const r = new FileReader();
        r.onload = (e) => {
          const text = e.target.result;
          const looksLikeGedcom = /^0\s+/.test(text);
          if (isGedcomFile(f) || looksLikeGedcom) {
            document.getElementById("family-json-input").value = text;
            updateFamilyTree(true);
          } else {
            const prettyInput = JSON.stringify(JSON.parse(text), null, 2);
            document.getElementById("family-json-input").value = prettyInput;
            updateFamilyTree(false);
          }
        };
        r.readAsText(f);
      }

      // parse the textarea content (JSON or GEDCOM) and update the family tree
      function updateFamilyTree(forceGedcom, title = "") {
        const input = document.getElementById("family-json-input").value.trim();
        // Detect GEDCOM by explicit flag or by content starting with a level-0 line
        const looksLikeGedcom = forceGedcom || /^0\s+/.test(input);
        try {
          if (looksLikeGedcom) {
            const { individuals, families } = parseGedcom(input);
            activeIndividuals = individuals;
            activeFamilies = families;
            const trees = gedcomToTree(individuals, families);
            populateNotesStore(trees);
            // Compose a title and subtitle for GEDCOM with multiple roots
            let surname = "Family";
            if (trees.length === 1) {
              const parts = (trees[0].name || "").split(" ");
              surname =
                parts.length > 1
                  ? parts[parts.length - 1]
                  : parts[0] || "Family";
            } else if (trees.length > 1) {
              surname = "Multiple Families";
            }
            title = title || "The " + surname + " Family";
            // const subtitle =
            //   trees.length > 1
            //     ? `A genealogical record with ${trees.length} roots`
            //     : "A genealogical record";
            const subtitle = "";
            initializeFamilyPaging(title, subtitle, trees);
          } else {
            activeIndividuals = {};
            activeFamilies = {};
            const parsedJson = JSON.parse(input);
            populateNotesStore(parsedJson);
            const title = parsedJson.title || "Family Tree";
            const subtitle = parsedJson.subtitle || "";
            initializeFamilyPaging(title, subtitle, parsedJson);
          }
        } catch (e) {
          alert("Error parsing file: " + e.message);
        }
      }
      // wrap the family tree HTML and styles for export
      function getWrappedHtmlForExport() {
        const htmlContent = document.getElementById(
          "family-tree-container",
        ).outerHTML;
        const style = document.querySelector("style").outerHTML;
        return `<!DOCTYPE html>
                <html>
                <head>
                <meta charset="UTF-8">
                <title>Family Tree</title>
                ${style}
                </head>
                <body>
                ${htmlContent}
                </body>
                </html>`;
      }
      // export the family tree as an HTML file
      function exportAsHtml() {
        const wrappedHtml = getWrappedHtmlForExport();
        const blob = new Blob([wrappedHtml], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "family_tree.html";
        a.click();
        URL.revokeObjectURL(url);
      }

      // export parsed GEDCOM data from the textarea as a JSON file
      function exportGedcomAsJson() {
        const input = document.getElementById("family-json-input").value.trim();
        const looksLikeGedcom = /^0\s+/.test(input);

        if (!looksLikeGedcom) {
          alert(
            "The current input does not look like GEDCOM. Load a .ged file first.",
          );
          return;
        }

        try {
          const { individuals, families } = parseGedcom(input);
          const trees = gedcomToTree(individuals, families);

          let surname = "Family";
          if (trees.length === 1) {
            const parts = (trees[0].name || "").split(" ");
            surname =
              parts.length > 1 ? parts[parts.length - 1] : parts[0] || "Family";
          } else if (trees.length > 1) {
            surname = "Multiple Families";
          }

          const exportJson = {
            title: "The " + surname + " Family",
            subtitle:
              trees.length > 1
                ? `A genealogical record with ${trees.length} roots`
                : "A genealogical record",
            trees,
          };

          const pretty = JSON.stringify(exportJson, null, 2);
          const blob = new Blob([pretty], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "parsed_family_tree.json";
          a.click();
          URL.revokeObjectURL(url);
        } catch (e) {
          alert("Error parsing GEDCOM for JSON export: " + e.message);
        }
      }

      // open the family tree in a new tab
      function openHTMLInNewTab() {
        const wrappedHtml = getWrappedHtmlForExport();
        const blob = new Blob([wrappedHtml], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        window.open(url, "_blank");
      }

      async function loadEnglishRoyalFamilyGedcom() {
        return loadGedcomFromUrl(
          "https://family-tree-maker.wisp.place/english_royals.ged",
          "English Royal Family",
        );
      }

      async function loadGedcomFromUrl(url, title = "Family Tree from GEDCOM URL "+url) {
        try {
          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(
              "Network response was not ok: " +
                [response.statusText, response.status]
                  .filter(Boolean)
                  .join(" "),
            );
          }
          const text = await response.text();
          document.getElementById("family-json-input").value = text;
          updateFamilyTree(true, title);
        } catch (error) {
          alert("Error loading GEDCOM file: " + error.message);
        }
      }
    </script>
    <div id="family-tree-container"></div>
    <script>
      function showSpouseFamiliesModal(spousePersonId) {
        const spousePerson = activeIndividuals[spousePersonId];
        const spouseName = spousePerson?.name || "Spouse";

        const allFamilyIds = (personRootFamilyIdsCache[spousePersonId] || [])
          .filter((id) => rootFamilyIdToIndexMap.has(id));

        const modal = document.getElementById("spouse-families-modal");
        if (!modal) return;

        const titleEl = document.getElementById("spouse-families-modal-title");
        if (titleEl) titleEl.textContent = spouseName + " — Family Pages";

        const listEl = document.getElementById("spouse-families-modal-list");
        if (listEl) {
          if (allFamilyIds.length === 0) {
            listEl.innerHTML = '<p style="color:var(--muted);">No navigable family pages found for this person.</p>';
          } else {
            listEl.innerHTML = allFamilyIds
              .map((famId) => {
                const tree = activeRootFamilyTrees.find((t) => t.familyId === famId);
                const label = tree
                  ? tree.spouse
                    ? `${tree.name} & ${tree.spouse.name}`
                    : tree.name
                  : famId;
                return `<button class="button-small" style="display:block;width:100%;text-align:left;margin-bottom:6px;" onclick='goToRootFamilyIdForPerson(${JSON.stringify(famId)}, ${JSON.stringify(spousePersonId)});closeSpouseFamiliesModal();'>${label}</button>`;
              })
              .join("");
          }
        }

        modal.setAttribute("aria-hidden", "false");
        modal.classList.add("open");
        document.body.classList.add("modal-open");
        const inner = modal.querySelector(".note-modal-inner");
        if (inner) inner.focus();
      }

      function closeSpouseFamiliesModal() {
        const modal = document.getElementById("spouse-families-modal");
        if (!modal) return;
        modal.setAttribute("aria-hidden", "true");
        modal.classList.remove("open");
        document.body.classList.remove("modal-open");
      }

      function enableNoteModalFocusTrap(modal) {
        if (noteModalFocusTrapHandler) return;
        noteModalFocusTrapHandler = (event) => {
          if (event.key !== "Tab") return;

          const modalInner = modal.querySelector(".note-modal-inner");
          if (!modalInner) return;

          const focusableNodes = modalInner.querySelectorAll(
            'a[href], area[href], button:not([disabled]), input:not([disabled]):not([type="hidden"]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])',
          );
          const focusable = Array.from(focusableNodes).filter(
            (el) => el.offsetParent !== null,
          );

          if (focusable.length === 0) {
            event.preventDefault();
            modalInner.focus();
            return;
          }

          const first = focusable[0];
          const last = focusable[focusable.length - 1];

          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        };

        document.addEventListener("keydown", noteModalFocusTrapHandler);
      }

      function disableNoteModalFocusTrap() {
        if (!noteModalFocusTrapHandler) return;
        document.removeEventListener("keydown", noteModalFocusTrapHandler);
        noteModalFocusTrapHandler = null;
      }

      function showNoteModal(noteId, triggerEl) {
        const modal = document.getElementById("note-modal");
        if (!modal) return;
        lastNoteModalTrigger = triggerEl;
        const text = noteId ? notesById[noteId] || "" : "";
        document.getElementById("note-modal-content").textContent = text;
        modal.setAttribute("aria-hidden", "false");
        modal.classList.add("open");
        document.body.classList.add("modal-open");
        enableNoteModalFocusTrap(modal);
        const closeButton = modal.querySelector(".note-modal-close");
        if (closeButton) {
          closeButton.focus();
        }
      }

      function personOnKeyDown(event, thisEl) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          thisEl.click();
        }
      }
      function closeNoteModal() {
        const modal = document.getElementById("note-modal");
        if (!modal) return;
        disableNoteModalFocusTrap();
        modal.setAttribute("aria-hidden", "true");
        modal.classList.remove("open");
        document.body.classList.remove("modal-open");
        if (lastNoteModalTrigger) {
          lastNoteModalTrigger.focus();
          lastNoteModalTrigger = null;
        }
      }

      function urlToHumanReadableTitle(url) {
        try {
          const decoded = decodeURIComponent(url);
          const parts = decoded.split("/").filter(Boolean);
          const lastPart = parts[parts.length - 1] || "Tree";
          return lastPart.replace(/[-_]+/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());
        } catch (e) {
          return url;
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            closeNoteModal();
            closeSpouseFamiliesModal();
          }
        });

        // parse source from URL query parameter if present, otherwise use default familyJson
        const urlParams = new URLSearchParams(window.location.search);
        const sourceParam = urlParams.get("source");
        if (sourceParam == "english_royals") {
          console.log(
            "Loading English Royal Family GEDCOM from URL parameter...",
          );
          // load the British Royal Family GEDCOM from the provided URL
          loadEnglishRoyalFamilyGedcom();
        } else if (sourceParam == "url") {
          const urlToLoad = urlParams.get("url");
          if (urlToLoad) {
            console.log(
              "Loading GEDCOM from URL specified in query parameter: " + urlToLoad,
            );
            loadGedcomFromUrl(urlToLoad, urlToHumanReadableTitle(urlToLoad));
          } else {
            alert(
              "URL parameter 'url' is present but no URL specified",
            );
          }
        } else {
          console.log(
            "No source parameter in URL, using default familyJson data.",
          );
          // populate the textarea with the default JSON
          document.getElementById("family-json-input").value = JSON.stringify(
            familyJson,
            null,
            2,
          );
          updateFamilyTree();
        }
      });
    </script>
  </body>
