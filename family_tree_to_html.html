<html>
  <head>
    <meta charset="UTF-8" />
    <title>Family Tree</title>
    <style>
      :root {
        --cream: #f7f3ec;
        --parchment: #ede5d4;
        --ink: #1c1710;
        --brown: #6b4c2a;
        --rust: #a0522d;
        --gold: #c9a84c;
        --gold-lt: #e8d5a3;
        --line: #c4a87a;
        --muted: #7a6a54;
        --card-bg: #fffdf7;
        --light-green: #d4e8d0;
        --line-width: 1.5px;
        --vertical-connect-line-height: 20px;
        --loving-blue-color: #6a8fb0;
        --person-width: 64px;
        --heart-width: 18px;
        --person-margin: 5px;
        --spouse-lighten-pcnt: 40%;
        --border-radius: 7px;
        --family-node-height: 150px;
        --royal-blue: #617ac6;
      }

      #note-modal {
        position: fixed;
        display: none;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.45);
        z-index: 9999;
      }

      #note-modal.open {
        display: block;
      }

      #note-modal-inner {
        background: var(--card-bg);
        border: 1px solid var(--gold-lt);
        border-radius: 10px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
        position: fixed;
        max-height: 60vh;
        overflow-y: auto;
        padding: 2rem;
      }

      #note-modal-close {
        position: absolute;
        top: 10px;
        right: 14px;
        cursor: pointer;
        font-size: 1.5rem;
        color: var(--muted);
      }

      #drop-zone {
        border: 1.5px dashed var(--color-border-secondary);
        /* border-radius:12px; */
        margin-block: 10px;
        padding: 3rem 2rem;
        text-align: center;
        cursor: pointer;
        background: var(--parchment);
      }
      #drop-zone:hover,
      #drop-zone.drag-over {
        opacity: 0.8;
      }
      #drop-zone i {
        font-size: 36px;
        color: var(--color-text-secondary);
        display: block;
        margin-bottom: 12px;
      }
      #drop-zone p {
        color: var(--color-text-secondary);
        font-size: 14px;
        margin-top: 6px;
      }
      #drop-zone strong {
        color: var(--color-text-primary);
        font-size: 15px;
        display: block;
      }
      #file-input {
        display: none;
      }

      button {
        margin-top: 10px;
        padding: 10px 20px;
        font-size: 1rem;
        background-color: var(--rust);
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .button-small {
        padding: 6px 12px;
        font-size: 0.9rem;
      }

      .button-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 10px;
      }

      .royal-blue {
        background-color: var(--royal-blue);
      }

      body {
        background: var(--cream);
        font-family: "Cormorant Garamond", Georgia, serif;
        color: var(--ink);
        min-height: 100vh;
        padding: 3rem 1.5rem 5rem;
        /* background-image:
              radial-gradient(ellipse at 20% 10%, #e8d9bf44 0%, transparent 50%),
              radial-gradient(ellipse at 80% 90%, #d4b89644 0%, transparent 50%),
              /* reverse */
        /* radial-gradient(ellipse at 20% 10%, #d4b89644 0%, transparent 50%), */
        /* radial-gradient(ellipse at 80% 90%, #e8d9bf44 0%, transparent 50%);  */
      }

      header {
        text-align: center;
        margin-bottom: 3rem;
      }

      header::before,
      header::after {
        content: "";
        display: block;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          var(--gold),
          transparent
        );
        margin: 0.9rem auto;
        width: 55%;
      }

      .family-name {
        font-family: "Playfair Display", Georgia, serif;
        font-size: clamp(2rem, 4.5vw, 3.6rem);
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--ink);
        line-height: 1;
      }

      .family-sub {
        font-size: 1rem;
        color: var(--muted);
        font-style: italic;
        letter-spacing: 0.1em;
        margin-top: 0.4rem;
      }

      .ornament {
        font-size: 1.3rem;
        color: var(--gold);
        display: block;
        margin: 0.5rem 0;
      }

      .grid-two-cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
        margin-top: 5px;
        /* margin-block: var(--vertical-connect-line-height); */
        width: 100%;
      }

      .line-right {
        border-right: var(--line-width) solid var(--line);
      }

      .couple {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: flex-start;
        /* display: grid; */
        /* minmax ensures the spouses are equal width, allowing us to know where the center of left spouse is */
        /* grid-template-columns: minmax(75px, 1fr) auto minmax(75px, 1fr); */
      }
      .spouse-left {
        width: 150px;
        display: flex;
        flex-direction: row;
        justify-content: flex-end;
      }
      .spouse-right {
        width: 150px;
        display: flex;
        flex-direction: row;
        justify-content: flex-start;
      }

      .siblings {
        display: flex;
        justify-content: center;
        flex-direction: row;
        align-items: flex-start;
        /* gap: 10px; */
      }

      /* alternate background colors for siblings children */
      /* .siblings > div:nth-child(odd) {
        background-color: color-mix(in srgb, var(--cream), white 40%); */
      /* } */

      /* vertical line above child - doesn't work so commented out. see family-node ::after instead*/
      /* the rendered ::after is invisible, maybe z-index issues */
      /* .photo:not(.is-spouse)::after {
        content: "";
        position: absolute;
        top: calc(var(--vertical-connect-line-height) * -1);
        height: calc(var(--vertical-connect-line-height) * 1);
        left: 0;
        right: 50%;
        border-right: calc(var(--line-width) * 1) solid var(--line);
      } */

      .couple-heart {
        width: var(--heart-width);
        font-size: 30px;
        margin-top: 10px;
        color: var(--rust);
        text-align: center;
      }

      .family-tree {
        width: fit-content;
        padding-right: 20px;
      }

      .family-node {
        min-width: 120px;
        padding-top: var(--vertical-connect-line-height);
        position: relative;
        /* fixed total height controls how tall the flexible lines between generations are. */
        /* the height includes the person card and the connecting lines */
        height: var(--family-node-height);
        display: flex;
        align-items: center;
        flex-direction: column;
      }

      .family-node.single-child:not(.has-spouse)::after {
        content: "";
        position: absolute;
        z-index: 1;
        top: 0;
        height: calc(var(--vertical-connect-line-height) * 1);
        left: 0;
        right: 50%;

        /* needed because the .photo vertical line is hidden by this absolute div */
        border-right: calc(var(--line-width) * 1) solid var(--line);
      }

      .family-node.middle-child {
        /* for middle children, a full top border */
        border-top: calc(var(--line-width) * 1) solid var(--line);
      }
      .family-node.middle-child::after {
        content: "";
        position: absolute;
        z-index: 1;
        top: 0;
        height: calc(var(--vertical-connect-line-height) * 1);
        left: 0;
        right: 50%;

        /* needed because the .photo vertical line is hidden by this absolute div */
        border-right: calc(var(--line-width) * 1) solid var(--line);
      }
      .family-node.middle-child.has-spouse::after {
        /* move it to the left so that we're pointing to center of child spouse instead of
         center of couple (heart)   */
        right: calc(
          50% + var(--person-width) / 2 + var(--heart-width) / 2 +
            var(--person-margin)
        );
      }

      .family-node.first-of-children::after {
        content: "";
        position: absolute;
        z-index: 1;
        top: 0;
        /* subtract line-width to account for top border */
        height: calc(
          var(--vertical-connect-line-height) * 1 - var(--line-width)
        );
        left: 50%;
        right: 0;
        border-top: calc(var(--line-width) * 1) solid var(--line);

        /* needed because the .photo vertical line is hidden by this absolute div */
        border-left: calc(var(--line-width) * 1) solid var(--line);
        border-top-left-radius: var(--border-radius);
      }
      .family-node.first-of-children.has-spouse::after {
        /* move it to the left so that we're pointing to center of child spouse instead of
         center of couple (heart)   */
        left: calc(
          50% - var(--person-width) / 2 - var(--heart-width) / 2 -
            var(--person-margin)
        );
      }

      .family-node.last-of-children::after {
        content: "";
        position: absolute;
        z-index: 1;
        top: 0;
        /* subtract line-width to account for top border */
        height: calc(
          var(--vertical-connect-line-height) * 1 - var(--line-width)
        );
        left: 0;
        right: 50%;
        border-top: calc(var(--line-width) * 1) solid var(--line);

        /* needed because the .photo vertical line is hidden by this absolute div */
        border-right: calc(var(--line-width) * 1) solid var(--line);
        border-top-right-radius: var(--border-radius);
      }
      .family-node.last-of-children.has-spouse::after {
        /* move it to the left so that we're pointing to center of child spouse instead of
         center of couple (heart)   */
        right: calc(
          50% + var(--person-width) / 2 + var(--heart-width) / 2 +
            var(--person-margin)
        );
      }

      .family-node.single-child.has-spouse::after {
        content: "";
        position: absolute;
        z-index: 1;
        top: 0;
        /* subtract line-width to account for top border */
        height: calc(
          var(--vertical-connect-line-height) * 1 - var(--line-width)
        );
        /* for single-child couple, we want the top border from center of child spouse to couple heart center */
        left: calc(
          50% - var(--person-width) / 2 - var(--heart-width) / 2 -
            var(--person-margin)
        );
        right: 50%;
        border-top: calc(var(--line-width) * 1) solid var(--line);

        /* needed because the .photo vertical line is hidden by this absolute div */
        border-left: calc(var(--line-width) * 1) solid var(--line);
        border-top-left-radius: var(--border-radius);
      }

      /* ── Person card ── */
      .person {
        display: flex;
        flex-direction: column;
        align-items: center;
        /* background-color: red; */
        /* width: 110px; */
        margin: 0 var(--person-margin);
        /* padding-bottom: 3px; */
        /* border-bottom: var(--line-width) solid var(--light-green); */
      }

      .photo {
        /* anchor for vertical lines ::after */
        position: relative;

        width: var(--person-width);
        /* padding: 10px; */
        height: var(--person-width);
        border-radius: 50%;
        background: var(--parchment);
        border: 2px solid var(--gold-lt);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Playfair Display", serif;
        font-size: 1.3rem;
        font-weight: 600;
        color: var(--brown);
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        /* uppercase the initials */
        text-transform: uppercase;
      }

      .photo::after {
        content: "";
        position: absolute;
        inset: 3px;
        border-radius: 50%;
        border: 1px solid rgba(201, 168, 76, 0.3);
        pointer-events: none;
      }

      /* generation-tinted photo rings */
      .gen-1 .photo {
        background: #e8d5b0;
        border-color: #c9a84c;
      }
      /* lighten spouse colors */
      /* .gen-1 .spouse-right .photo {
        background-color: color-mix(in srgb, #e8d5b0, white var(--spouse-lighten-pcnt));
        border-color: color-mix(in srgb, #c9a84c, white var(--spouse-lighten-pcnt));
      } */

      .gen-2 .photo {
        background: #d4e8d0;
        border-color: #7aad72;
      }
      .gen-2 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #d4e8d0,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #7aad72,
          white var(--spouse-lighten-pcnt)
        );
      }

      .gen-3 .photo {
        background: #d0dce8;
        border-color: #6a8fb0;
      }
      .gen-3 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #d0dce8,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #6a8fb0,
          white var(--spouse-lighten-pcnt)
        );
      }

      .gen-4 .photo {
        background: #e8d4e4;
        border-color: #b07aa0;
      }
      .gen-4 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #e8d4e4,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #b07aa0,
          white var(--spouse-lighten-pcnt)
        );
      }

      .gen-5 .photo {
        background: #d4d0e8;
        border-color: #7a72ad;
      }
      .gen-5 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #d4d0e8,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #7a72ad,
          white var(--spouse-lighten-pcnt)
        );
      }

      .gen-6 .photo {
        background: #efc1c1;
        border-color: #e8968c;
      }
      .gen-6 .spouse-right .photo {
        background-color: color-mix(
          in srgb,
          #efc1c1,
          white var(--spouse-lighten-pcnt)
        );
        border-color: color-mix(
          in srgb,
          #e8968c,
          white var(--spouse-lighten-pcnt)
        );
      }

      /* .gen-7 .photo { background: #d0e8d4; border-color: #72ad7a; } */

      .person-info {
        text-align: center;
        margin-top: 7px;

        /* allow multiline text but cut off with ellipsis */
        display: -webkit-box;
        -webkit-line-clamp: 4;
        line-clamp: 4;
        -webkit-box-orient: vertical;
        box-orient: vertical;
        overflow: hidden;
      }
      .spouse-left .person-info {
        text-align: right;
      }
      .spouse-right .person-info {
        text-align: left;
      }

      .person-name {
        font-family: "Playfair Display", Georgia, serif;
        font-size: 0.8rem;
        font-weight: 600;
        line-height: 1.2;
        color: var(--ink);

        /* ellipsis: "..."; */
        /* max-width: 150px; */
        /* white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis; */
      }

      .person-dates {
        font-size: 0.68rem;
        color: var(--muted);
        font-style: italic;
        margin-top: 2px;
        letter-spacing: 0.02em;
      }

      .person-note {
        margin-top: 4px;
        font-size: 0.7rem;
        color: var(--rust);
        font-style: italic;
      }

      .person-marriage-branch {
        margin-top: 3px;
        padding: 1px 6px;
        border: 1px solid var(--gold-lt);
        border-radius: 999px;
        font-size: 0.58rem;
        color: var(--brown);
        background: color-mix(in srgb, var(--gold-lt), white 55%);
        letter-spacing: 0.03em;
        display: inline-block;
      }

      .couple-family-skipped {
        margin-top: 3px;
        padding: 1px 6px;
        border: 1px solid var(--gold-lt);
        border-radius: 3px;
        font-size: 0.58rem;
        color: var(--brown);
        background: color-mix(in srgb, var(--gold-lt), white 65%);
        letter-spacing: 0.03em;
        display: inline-block;
      }

      /* ── Animations ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .person {
        animation: fadeUp 0.6s ease both;
      }

      .gen-1 .person {
        animation-delay: 0.05s;
      }

      .gen-2 .person {
        animation-delay: 0.15s;
      }

      .gen-3 .person {
        animation-delay: 0.25s;
      }

      .gen-4 .person {
        animation-delay: 0.35s;
      }

      .gen-5 .person {
        animation-delay: 0.45s;
      }

      .gen-6 .person {
        animation-delay: 0.55s;
      }

      /* .gen-7 .person { animation-delay: 0.65s; } */

      .person:hover .photo {
        transform: scale(1.08);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.14);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .photo {
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
    </style>
    <script>
      function getInitials(name) {
        const parts = (name || "").split(" ").filter((part) => part.length > 0);
        if (parts.length >= 2) {
          const lastNameInitial = parts[1][0];
          // check that lastNameInitial is a ascii
          const isLastNameAscii = /[A-Za-z]/.test(lastNameInitial);
          const isLastNameRussian = /[А-Яа-яЁё]/.test(lastNameInitial);
          return (
            parts[0][0] +
            (isLastNameAscii || isLastNameRussian ? lastNameInitial : "")
          );
        } else {
          return (name || "").slice(0, 1);
        }
      }
      function renderPersonStyle(person) {
        let style = "";
        if (person.color) {
          style += `color: ${person.color};`;
        }
        if (person.backgroundColor) {
          style += `background-color: ${person.backgroundColor};`;
        }
        return style;
      }
      function renderCouple(person, generation, isSingleOrMiddleChild) {
        let coupleHtml = `<div class="couple gen-${generation}">`;
        // person.spouse exists
        coupleHtml += `<div class="spouse-left">`;
        coupleHtml += `<div class="person" style="align-items: flex-end">`;
        coupleHtml += `<div class="photo">${getInitials(person.name)}</div>`;
        coupleHtml += `<div class="person-info"><div class="person-name" title="${person.name}">${person.name}</div>`;
        if (person.marriageLabel) coupleHtml += `<div class="person-marriage-branch">${person.marriageLabel}</div>`;
        if (person.dates) coupleHtml += `<div class="person-dates">${person.dates}</div>`;
        coupleHtml += renderPersonNote(person);
        coupleHtml += `</div>`; // close person-info div
        coupleHtml += `</div>`; // close person div
        coupleHtml += `</div>`; // close spouse-left div
        coupleHtml += `<div class="couple-heart">♥</div>`;
        coupleHtml += `<div class="spouse-right">`;
        coupleHtml += `<div class="person" style="align-items: flex-start">`;
        coupleHtml += `<div class="photo " style="${renderPersonStyle(person.spouse)}">${getInitials(person.spouse.name)}</div>`;
        coupleHtml += `<div class="person-info"><div class="person-name" title="${person.spouse.name}">${person.spouse.name}</div>`;
        if (person.spouse.dates) coupleHtml += `<div class="person-dates">${person.spouse.dates}</div>`;
        coupleHtml += renderPersonNote(person.spouse);
        coupleHtml += `</div>`; // close person-info div
        coupleHtml += `</div>`; // close person div
        coupleHtml += `</div>`; // close spouse-right div
        coupleHtml += `</div>`; // close couple div
        if (person.familySkipped) coupleHtml += `<div class="couple-family-skipped">Family already rendered in another tree</div>`;
        return coupleHtml;
      }
      function renderPerson(person, generation) {
        let personHtml = "";
        if (person.spouse) {
          personHtml += renderCouple(person, generation);
        } else {
          personHtml += `<div class="person gen-${generation}">`;
          personHtml += `<div class="photo" style="${renderPersonStyle(person)}">${getInitials(person.name)}</div>`;
          personHtml += `<div class="person-info"><div class="person-name" title="${person.name}">${person.name}</div>`;
          if (person.marriageLabel) personHtml += `<div class="person-marriage-branch">${person.marriageLabel}</div>`;
          if (person.dates) personHtml += `<div class="person-dates">${person.dates}</div>`;
          personHtml += renderPersonNote(person);
          personHtml += `</div></div>`;
        }
        return personHtml;
      }
      function renderPersonNote(person) {
        if (person.note) {
          const escaped = person.note.replace(/`/g, "\\`");
          const clampedNote = person.note.length > 100 ? person.note.slice(0, 100) + "..." : person.note;
          return `<span class="person-note" style="cursor: pointer; font-size: 0.7rem;" onclick="showNoteModal(\`${escaped}\`, this)">[Note] ${clampedNote}</span>`;
        }
        return "";
      }
      function renderNode(
        node,
        generation = 1,
        isFirstChild = true,
        isLastChild = true
      ) {
        // flex:1 ensure first/last family-node hugs left/right edge of .siblings div.
        // .siblings with multiple family-nodes has border-top, and we use connection-top-left/right-corner
        // to replace '---' edge with corners connecting to top center of family-node
        // ( '|--' for first,  '--|' for last family-node).
        let nodeHtml = "<div style='flex: 1;'>";

        const borderClass =
          generation == 1
            ? ""
            : isFirstChild && isLastChild
              ? "single-child"
              : isFirstChild
                ? "first-of-children"
                : isLastChild
                  ? "last-of-children"
                  : "middle-child";

        nodeHtml += `<div class="family-node ${borderClass} ${node.spouse ? "has-spouse" : ""}">`;

        nodeHtml += renderPerson(node, generation);

        if (node.children && node.children.length > 0) {
          nodeHtml += renderConnectionToChildren();
          nodeHtml += "</div>"; // close person + connection container div
          nodeHtml += `<div class="siblings">`;
          for (let i = 0; i < node.children.length; i++) {
            const child = node.children[i];
            const isFirstChild = i === 0;
            const isLastChild = i === node.children.length - 1;
            nodeHtml += renderNode(
              child,
              generation + 1,
              isFirstChild,
              isLastChild
            );
          }
          nodeHtml += "</div>"; // close siblings container div
        } else {
          nodeHtml += "</div>"; // close person container div if no children
        }
        nodeHtml += "</div>";
        return nodeHtml;
      }
      function renderConnectionToChildren() {
        // flex:1 makes it take rest of family-node (person card + line)'s static height.
        // static height on family-node ensure all children align horizontally even
        // if person card heights differ between siblings, for example due to multi-line names.
        return `
                <div class="grid-two-cols" style="flex:1">
                    <div class="line-right"></div>
                    <div></div>
                </div>
                `;
      }
      function familyTreeJsonToHtml(title, subtitle, familyTrees) {
        // familyTrees can be a single object or an array
        const trees = Array.isArray(familyTrees) ? familyTrees : [familyTrees];
        let allTreesHtml = '';
        for (const tree of trees) {
          allTreesHtml += renderNode(tree);

          // render a pretty separator between multiple family trees, except after the last one
          if (trees.length > 1 && tree !== trees[trees.length - 1]) {
            allTreesHtml += `
              <div style="text-align: center; margin: 2rem 0; color: var(--muted);">
                <span style="font-size: 1.5rem;">✦ Next Family ✦</span>
              </div>
            `;
          }
        }
        return (
          `
            <div class="family-tree">
              <header>
                <span class="ornament">✦</span>
                <h1 class="family-name">${title}</h1>
                <p class="family-sub">${subtitle}</p>
                <span class="ornament">✦</span>
              </header>` +
            allTreesHtml +
            `</div>
          `
        );
      }

      const familyJson = {
        title: "The Smith Family",
        subtitle: "A record of four generations",
        name: "Grampa",
        dates: "b.1920",
        spouse: {
          name: "Gramma",
        },

                  //   },
                ],

            ],
          },

            spouse: {

            },
          },
          {

            // spouse: {
            //   name: "Child2 spouse",
            // },

                children: [

                  },
                  {

      // ── GEDCOM Parser ─────────────────────────────────────────────────────

      function parseGedcom(text) {
        const individuals = {};
        const families    = {};
        if (!text || typeof text !== "string") {
          return { individuals, families };
        }
        const lines = text.split(/\r?\n/);
        let rec    = null;
        let subTag = null;

        for (let i = 0; i < lines.length; i++) {
          let raw = lines[i];
          raw = raw.trim();
          if (!raw) continue;
          const m = raw.match(/^(\d+)\s+(?:(@[^@]+@)\s+)?(\S+)(?:\s+(.*))?$/);
          if (!m) continue;
          const level = parseInt(m[1]);
          const xref  = m[2] ? m[2].replace(/@/g, "") : null;
          const tag   = m[3].toUpperCase();
          const value = (m[4] || "").trim();

          if (level === 0) {
            subTag = null;
            if (tag === "INDI" && xref) {
              rec = { type: "INDI", id: xref, famcList: [], famsList: [] };
              individuals[xref] = rec;
            } else if (tag === "FAM" && xref) {
              rec = { type: "FAM", id: xref, chilIds: [] };
              families[xref] = rec;
            } else { 
              rec = null;
            }
            continue;
          }

          if (!rec) continue;
          if (level === 1) subTag = tag;

          if (rec.type === "INDI") {
            if (tag === "NAME" && level === 1) {
              if (!rec.name) {
                // some records contain "NAME //", don't override existing name with blanks
                rec.name = value.replace(/\//g, " ").replace(/\s+/g, " ").trim();
              }
            } else if (tag === "SEX"  && level === 1) { rec.sex = value;
            } else if (tag === "BIRT" && level === 1) { rec.birth = rec.birth || {};
            } else if (tag === "DEAT" && level === 1) { rec.death = rec.death || {};
            } else if (tag === "DATE" && level === 2) {
              if (subTag === "BIRT") { rec.birth = rec.birth || {}; rec.birth.date = value; }
              else if (subTag === "DEAT") { rec.death = rec.death || {}; rec.death.date = value; }
            } else if (tag === "PLAC" && level === 2) {
              if (subTag === "BIRT") { rec.birth = rec.birth || {}; rec.birth.place = value; }
              else if (subTag === "DEAT") { rec.death = rec.death || {}; rec.death.place = value; }
            } else if (tag === "NOTE" && level === 1) {
              rec.note = value;
              // Look ahead for CONC and CONT lines to concatenate
              let noteLines = [value];
              while (i + 1 < lines.length) {
                const nextRaw = lines[i + 1].trim();
                const mNext = nextRaw.match(/^(\d+)\s+(\S+)(?:\s+(.*))?$/);
                if (!mNext) break;
                const nextLevel = parseInt(mNext[1]);
                const nextTag = mNext[2].toUpperCase();
                const nextValue = (mNext[3] || "").trim();
                // console.log("looking for CONC/CONT, found:", { nextLevel, nextTag, nextValue });
                if (nextTag === "CONC" && nextLevel === 2) {
                  if (nextValue === "") {
                    // console.log("CONC with empty value, adding newline");
                    noteLines.push("\n"); // use <br> to represent newlines in HTML
                  } else {
                    noteLines.push(nextValue);
                  }
                  i++;
                } else if (nextTag === "CONT" && nextLevel === 2) {
                  if (nextValue === "") {
                      // console.log("CONT with empty value, adding newline");
                    noteLines.push("\n"); // use <br> to represent newlines in HTML
                  } else {
                    noteLines.push(nextValue);
                  }
                  i++;
                } else {
                  break;
                }
              }
              rec.note = noteLines.join("");
            }
          } else if (rec.type === "FAM") {
            if (tag === "HUSB" && level === 1) { rec.husbId = value.replace(/@/g, "");
            } else if (tag === "WIFE" && level === 1) { rec.wifeId = value.replace(/@/g, "");
            } else if (tag === "CHIL" && level === 1) { rec.chilIds.push(value.replace(/@/g, ""));
            } else if (tag === "MARR" && level === 1) { rec.marr = rec.marr || {};
            } else if (tag === "DATE" && level === 2 && subTag === "MARR") {
              rec.marr = rec.marr || {}; rec.marr.date = value;
            }
          }
        }

        // go through families, and add to famcList for individuals appearing in childIds,
        // and to famsList for individuals appearing in husbId/wifeId
        for (const fam of Object.values(families)) {
          for (const childId of fam.chilIds) {
            const child = individuals[childId];
            if (child) {
              child.famcList.push(fam.id);
            } else {
              console.warn("no child found for id:", childId, "in family:", fam.id);
            }
          }
          if (fam.husbId) {
            const husb = individuals[fam.husbId];
            if (husb) {
              husb.famsList.push(fam.id);
            } else {
              console.warn("no husband found for id:", fam.husbId, "in family:", fam.id);
            }
          }
          if (fam.wifeId) {
            const wife = individuals[fam.wifeId];
            if (wife) {
              wife.famsList.push(fam.id);
            } else {
              console.warn("no wife found for id:", fam.wifeId, "in family:", fam.id);
            }
          }
        }
        // make sure famcList and famsList are unique and don't contain null/undefined values
        for (const indi of Object.values(individuals)) {
          indi.famcList = Array.from(new Set((indi.famcList || []).filter((id) => id)));
          indi.famsList = Array.from(new Set((indi.famsList || []).filter((id) => id)));
        } 
        return { individuals, families };
      }

      function gedcomFormatDates(birth, death) {
        const b = birth && birth.date ? birth.date : null;
        const d = death && death.date ? death.date : null;
        if (b && d) return b + " \u2013 " + d;
        if (b) return "b.\u00a0" + b;
        if (d) return "d.\u00a0" + d;
        return "";
      }

      function gedcomToTree(individuals, families) {
        const familyIds = new Set();

        function buildNodeVariants(personId, pathVisited = new Set()) {
          if (!personId) return [];
          const person = individuals[personId];
          if (!person) {
            console.warn("no person found for id:", personId);
            return [];
          }

          const baseNode = {
            name: person.name || "Unknown no name: " + `id: ${person.id || 'no id'}`,
          };
          const dates = gedcomFormatDates(person.birth, person.death);
          if (dates) baseNode.dates = dates;
          if (person.note) baseNode.note = person.note;

          // filter to those ids in famsList that actually exist in families, in case some GEDCOM files have dangling references
          const famIds = (person.famsList || []).filter((famId) => families[famId]);

          const variants = [];
          for (let idx = 0; idx < famIds.length; idx++) {
            const famId = famIds[idx];

            const visitKey = `${personId}|${famId}`;
            if (pathVisited.has(visitKey)) {
              // console.log("already visited person-family combination, skipping to avoid circular loop:", visitKey, person.name);
              continue;
            }

            const fam = families[famId];
            const node = { ...baseNode, familyId: famId } ; // , name: baseNode.name.replace(/\s*\(root \d+\)$/, "") + " " + visitKey }; // remove "(root i)" from variants below root level
            if (famIds.length > 1) {
              node.marriageLabel = `Marriage ${idx + 1} of ${famIds.length}`;
            }


            const spouseId = fam.husbId === personId ? fam.wifeId : fam.husbId;
            if (spouseId) {
              const spouse = individuals[spouseId];
              if (spouse) {
                node.spouse = {
                  name: spouse.name || "Unknown spouse no name: " + `id: ${spouse.id || 'no id'}`,
                };
                const spouseDates = gedcomFormatDates(spouse.birth, spouse.death);
                if (spouseDates) node.spouse.dates = spouseDates;
                if (spouse.note) node.spouse.note = spouse.note;
              }
            }

            if (familyIds.has(famId)) {
              // console.log("already rendered this family in another root, skipping to avoid duplicate family trees:", famId, person.name);
               // mark that we skipped rendering this family to avoid duplicate trees,
               // so that we can optionally indicate this in the UI if needed
              node.familySkipped = true;
              variants.push(node);
            } else {
              familyIds.add(famId);

              const nextVisited = new Set(pathVisited);
              nextVisited.add(visitKey);
              // console.log('visiting person-family combination:', visitKey, person.name, "spouseId:", spouseId, "spouse name:", node.spouse ? node.spouse.name : "no spouse");
              // if (spouseId) {
              //   pathVisited.add(`${spouseId}|${famId}`);
              //   console.log('also marking spouse-family combination as visited to avoid duplicate variant:', `${spouseId}|${famId}`);
              // }

              const children = [];
              for (const childId of (fam.chilIds || [])) {
                children.push(...buildNodeVariants(childId, nextVisited));
              }
              if (children.length > 0) node.children = children;

              variants.push(node);
            }
          }

          return variants.length > 0 ? variants : [baseNode];
        }

        const roots = [];
        for (const individual of Object.values(individuals)) {
          const childFamcIds = (individual.famcList || []).filter((famId) => families[famId]);
          if (childFamcIds.length > 0) {
            // console.log('individual has parents, skipping as root:', individual.id, individual.name);
            // console.log("full record", individual);
            continue;
          }
          // roots.push(individual);
          const spouseFamIds = (individual.famsList || []).filter((famId) => families[famId]);
          let hasAncestor = false;
          for (const famId of spouseFamIds) {
            const fam = families[famId];
            const spouseId = fam.husbId === individual.id ? fam.wifeId : fam.husbId;
            const spouse = individuals[spouseId];
            if (spouse) {
              const spouseFamcIds = (spouse.famcList || []).filter((famId) => families[famId]);
              if (spouseFamcIds.length > 0) {
                hasAncestor = true;
                // console.log('spouse has parents, so individual is not a root. individual: ', individual.id, individual.name, ", spouse: ", spouse.id, spouse.name);
                break;
              }
            }
          }
          if (!hasAncestor) {
            // console.log("adding root individual:", individual.id, individual.name);
            roots.push(individual);
          }
        }

        function getTreeSize(personId, visited = new Set()) {
          if (visited.has(personId)) return 0; // avoid infinite loops in case of circular references
          visited.add(personId);
          const person = individuals[personId];
          if (!person) return 0;
          let size = 1; // count self
          const famIds = (person.famsList || []).filter((famId) => families[famId]);
          for (const famId of famIds) {
            const fam = families[famId];
            const spouseId = fam.husbId === personId ? fam.wifeId : fam.husbId;
            if (spouseId) {
              size += 1; // count spouse
              size += getTreeSize(spouseId, visited);
            }
            for (const childId of (fam.chilIds || [])) {
              size += getTreeSize(childId, visited);
            }
          }
          return size;
        }

        // sort roots by number of generations in their tree (descending), so that bigger trees are rendered first and get the top position on the page
        roots.sort((a, b) => {
          const aTreeSize = getTreeSize(a.id, new Set());
          const bTreeSize = getTreeSize(b.id, new Set());
          return bTreeSize - aTreeSize;
        });

        const trees = [];
        for (const root of roots) {
          const familyNodes = buildNodeVariants(root.id);
          for (const familyNode of familyNodes) {
            if (familyNode.familySkipped) {
                // don't show duplicate root families with reversed spouses
                continue;
            }
            trees.push(familyNode);
          }
        }
        return trees;
      }
    </script>

    <script>
      // handle file drag and drop for the drop zone
      const dropZone = document.getElementById("drop-zone");
      const fileInput = document.getElementById("file-input");
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("drag-over");
      });
      dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("drag-over"),
      );
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("drag-over");
        if (e.dataTransfer.files[0]) readFamilyFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener("change", (e) => {
        if (e.target.files[0]) readFamilyFile(e.target.files[0]);
      });

      function isGedcomFile(f) {
        return /\.(ged|gedcom)$/i.test(f.name);
      }

      function readFamilyFile(f) {
        const r = new FileReader();
        r.onload = (e) => {
          const text = e.target.result;
          const looksLikeGedcom = /^0\s+/.test(text);
          if (isGedcomFile(f) || looksLikeGedcom) {
            document.getElementById("family-json-input").value = text;
            updateFamilyTree(true);
          } else {
            const prettyInput = JSON.stringify(JSON.parse(text), null, 2);
            document.getElementById("family-json-input").value = prettyInput;
            updateFamilyTree(false);
          }
        };
        r.readAsText(f);
      }

      // parse the textarea content (JSON or GEDCOM) and update the family tree
      function updateFamilyTree(forceGedcom) {
        const input = document.getElementById("family-json-input").value.trim();
        // Detect GEDCOM by explicit flag or by content starting with a level-0 line
        const looksLikeGedcom = forceGedcom || /^0\s+/.test(input);
        try {
          if (looksLikeGedcom) {
            const { individuals, families } = parseGedcom(input);
            const trees = gedcomToTree(individuals, families);
            // Compose a title and subtitle for GEDCOM with multiple roots
            let surname = "Family";
            if (trees.length === 1) {
              const parts = (trees[0].name || "").split(" ");
              surname = parts.length > 1 ? parts[parts.length - 1] : (parts[0] || "Family");
            } else if (trees.length > 1) {
              surname = "Multiple Families";
            }
            const title    = "The " + surname + " Family";
            const subtitle = trees.length > 1 ? `A genealogical record with ${trees.length} roots` : "A genealogical record";
            document.getElementById("family-tree-container").innerHTML =
              familyTreeJsonToHtml(title, subtitle, trees);
          } else {
            const parsedJson = JSON.parse(input);
            const title    = parsedJson.title    || "Family Tree";
            const subtitle = parsedJson.subtitle || "";
            document.getElementById("family-tree-container").innerHTML =
              familyTreeJsonToHtml(title, subtitle, parsedJson);
          }
        } catch (e) {
          alert("Error parsing file: " + e.message);
        }
      }
      // wrap the family tree HTML and styles for export
      function getWrappedHtmlForExport() {
        const htmlContent = document.getElementById(
          "family-tree-container",
        ).outerHTML;
        const style = document.querySelector("style").outerHTML;
        return `<!DOCTYPE html>
                <html>
                <head>
                <meta charset="UTF-8">
                <title>Family Tree</title>
                ${style}
                </head>
                <body>
                ${htmlContent}
                </body>
                </html>`;
      }
      // export the family tree as an HTML file
      function exportAsHtml() {
        const wrappedHtml = getWrappedHtmlForExport();
        const blob = new Blob([wrappedHtml], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "family_tree.html";
        a.click();
        URL.revokeObjectURL(url);
      }

      // export parsed GEDCOM data from the textarea as a JSON file
      function exportGedcomAsJson() {
        const input = document.getElementById("family-json-input").value.trim();
        const looksLikeGedcom = /^0\s+/.test(input);

        if (!looksLikeGedcom) {
          alert("The current input does not look like GEDCOM. Load a .ged file first.");
          return;
        }

        try {
          const { individuals, families } = parseGedcom(input);
          const trees = gedcomToTree(individuals, families);

          let surname = "Family";
          if (trees.length === 1) {
            const parts = (trees[0].name || "").split(" ");
            surname = parts.length > 1 ? parts[parts.length - 1] : (parts[0] || "Family");
          } else if (trees.length > 1) {
            surname = "Multiple Families";
          }

          const exportJson = {
            title: "The " + surname + " Family",
            subtitle: trees.length > 1
              ? `A genealogical record with ${trees.length} roots`
              : "A genealogical record",
            trees,
          };

          const pretty = JSON.stringify(exportJson, null, 2);
          const blob = new Blob([pretty], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "parsed_family_tree.json";
          a.click();
          URL.revokeObjectURL(url);
        } catch (e) {
          alert("Error parsing GEDCOM for JSON export: " + e.message);
        }
      }

      // open the family tree in a new tab
      function openHTMLInNewTab() {
        const wrappedHtml = getWrappedHtmlForExport();
        const blob = new Blob([wrappedHtml], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        window.open(url, "_blank");
      }

      async function loadEnglishRoyalFamilyGedcom() {
        const gedcomUrl = "https://family-tree-maker.wisp.place/english_royals.ged";
        try {
          const response = await fetch(gedcomUrl);
          if (!response.ok) {
            throw new Error("Network response was not ok: " + [response.statusText, response.status].filter(Boolean).join(" "));
          }
          const text = await response.text();
          document.getElementById("family-json-input").value = text;
          updateFamilyTree(true);
        } catch (error) {
          alert("Error loading GEDCOM file: " + error.message);
        }
      }
    </script>

      document.addEventListener("DOMContentLoaded", () => {

        const urlParams = new URLSearchParams(window.location.search);
        const sourceParam = urlParams.get("source");
        if (sourceParam == "english_royals") {
          console.log("Loading English Royal Family GEDCOM from URL parameter...");
          // load the British Royal Family GEDCOM from the provided URL
          loadEnglishRoyalFamilyGedcom();
        } else {
          console.log("No source parameter in URL, using default familyJson data.");
          // populate the textarea with the default JSON
          document.getElementById("family-json-input").value = JSON.stringify(familyJson, null, 2);
          updateFamilyTree();
        }
      });
    </script>
  </body>
</html>
