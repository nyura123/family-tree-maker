<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Family Tree</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      id="drop-zone"
      role="button"
      tabindex="0"
      aria-controls="file-input"
      aria-describedby="drop-zone-help"
      onclick="document.getElementById('file-input').click()"
    >
      <i class="ti ti-file-upload" aria-hidden="true"></i>
      <strong>Drop your family file here</strong>
      <p id="drop-zone-help">
        or click to browse — JSON or GEDCOM (.ged) format
      </p>
      <input
        type="file"
        id="file-input"
        aria-label="Choose a family file"
        accept=".json,.ged,.gedcom,.txt,text/plain"
      />
    </div>

    <div id="json-input">
      <!-- JSON data will be placed here, defaulting to the familyJson variable defined in the script -->
      <!-- multiline text input -->
      <textarea
        id="family-json-input"
        aria-label="Family tree input in JSON or GEDCOM format"
        style="width: 100%; height: 150px"
      ></textarea>
    </div>

    <button onclick="updateFromTextArea()">Update Family Tree</button>
    <button onclick="exportAsHtml()">Export as HTML</button>
    <!-- <button onclick="exportGedcomAsJson()">Export GEDCOM as JSON</button> -->
    <button onclick="openHTMLInNewTab()">Open in New Tab</button>
    <div
      class="button-row"
      style="justify-content: flex-start; gap: 12px; flex-wrap: wrap"
    >
      <!-- link button to ?source=english_royals -->
      <div>
        <!-- <a href="?source=english_royals">
          <button class="royal-blue button-small">
            Load English Royal Family GEDCOM from URL
          </button>
        </a> -->
        <!-- <button class="royal-blue" onclick="loadEnglishRoyalFamilyGedcom()">Load English Royal Family GEDCOM</button> -->
        <!-- <br></br> -->
        <!-- <div style="font-size: smaller; color: grey; margin-top: 3px">
          Source:
          <a
            href="https://chronoplexsoftware.com/myfamilytree/samples/index.htm"
            target="_blank"
            >Chronoplex Software Samples</a
          >
        </div> -->
      </div>

      </div>
      <br></br>
      <!-- <div style="margin-top: 12px">
        <small>Source list: <a href="https://chronoplexsoftware.com/myfamilytree/samples/index.htm" target="_blank" rel="noopener noreferrer">Chronoplex Software Samples</a> | <a href="https://github.com/D-Jeffrey/gedcom-samples/tree/main/famous%20family%20trees" target="_blank" rel="noopener noreferrer">D-Jeffrey's GEDCOM Samples</a></small>
      </div> -->
    <div id="family-tree-container">
      <div class="family-tree">
        <header>
          <span class="ornament">✦</span>
          <h1 id="family-title" class="family-name"></h1>
          <p id="family-subtitle" class="family-sub"></p>
          <span class="ornament">✦</span>
          <select id="public-gedcom-select" onchange="if(this.value) { //navigate to source=url of the selected option to load the GEDCOM file from that URL
            if (otherSourceValues[this.value]) {
              window.location.href = '?source=' + this.value;
              return;
            }
            window.location.href = '?source=url&url=' + encodeURIComponent(this.value);
          }"></select>
          <div id="selected-source-meta"></div>
          <div id="note-modal" aria-hidden="true" onclick="closeNoteModal()">
            <div class="note-modal-inner" role="dialog" aria-modal="true" aria-label="Person note" tabindex="-1" onclick="event.stopPropagation()">
              <span class="note-modal-close" role="button" tabindex="0" aria-label="Close note modal" onclick="closeNoteModal()" onkeydown="if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); closeNoteModal(); }">×</span>
              <div class="note-modal-content">
                <div class="person-note" id="note-modal-content" style="font-size: 1rem; white-space: pre-wrap;"></div>
              </div>
              <div class="note-modal-close-mobile">
                <button aria-label="Close note modal" onclick="closeNoteModal()">Close</button>
              </div>
            </div>
          </div>
          <div id="spouse-families-modal" aria-hidden="true" onclick="closeSpouseFamiliesModal()">
            <div class="note-modal-inner" role="dialog" aria-modal="true" aria-label="Spouse families" tabindex="-1" onclick="event.stopPropagation()">
              <span class="note-modal-close" role="button" tabindex="0" aria-label="Close" onclick="closeSpouseFamiliesModal()" onkeydown="if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); closeSpouseFamiliesModal(); }">×</span>
              <div class="note-modal-content">
                <h3 id="spouse-families-modal-title" style="margin:0 0 0.75rem;font-size:1.1rem;"></h3>
                <div id="spouse-families-modal-list"></div>
              </div>
              <div class="note-modal-close-mobile">
                <button aria-label="Close" onclick="closeSpouseFamiliesModal()">Close</button>
              </div>
            </div>
          </div>
        </header>
        <div id="family-tree-content"></div>
      </div>
    </div>
  <script type="module" src="modules/module.js"></script>
</body>
</html>
